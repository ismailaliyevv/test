<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel — TestHub</title>
<link id="_themeFont" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f8f9f4;--bg2:#eff4ec;--surface:#fff;--surface2:#f4f7f2;
  --border:#dde8d8;--border2:#c8d8c0;
  --accent:#2d6a4f;--accent2:#40916c;--accent3:#74c69d;
  --accent-light:#d8f3dc;--accent-pale:#edf7f0;
  --text:#1a2615;--text2:#2e4228;--muted:#7a8c74;
  --nav-bg:#fff;--card-shadow:rgba(45,106,79,0.10);
  --btn-text:#fff;--gold:#c9a84c;--danger:#c0392b;
  --font-heading:'Playfair Display',serif;
  --font-body:'Outfit',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;display:flex;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* SIDEBAR */
.sidebar{width:248px;background:var(--surface);border-right:1px solid var(--border);padding:20px 14px;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:50;overflow-y:auto;transition:background .35s,border-color .35s;}
.s-logo{font-family:var(--font-heading);font-size:1.3rem;font-weight:900;color:var(--accent);text-decoration:none;display:flex;align-items:center;gap:7px;padding:6px 10px;margin-bottom:4px;}
.s-logo::before{content:'◆';font-size:.75rem;color:var(--accent3);}
.s-role{font-size:.65rem;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--danger);padding:0 10px;margin-bottom:22px;}
.s-sec{font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);padding:0 10px;margin:14px 0 5px;}
.nav-btn{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;color:var(--muted);font-size:.87rem;font-weight:500;transition:all .2s;margin-bottom:2px;cursor:pointer;background:none;border:none;width:100%;text-align:left;font-family:var(--font-body);}
.nav-btn:hover{background:var(--bg2);color:var(--text);}
.nav-btn.active{background:var(--accent-pale);color:var(--accent);font-weight:700;border:1px solid var(--accent-light);}
.nav-btn .ni{font-size:1rem;width:18px;text-align:center;}
.nb{margin-left:auto;background:var(--danger);color:#fff;font-size:.6rem;font-weight:800;padding:2px 7px;border-radius:999px;}
.s-bottom{margin-top:auto;padding-top:14px;border-top:1px solid var(--border);}
.s-user{display:flex;align-items:center;gap:10px;padding:10px 12px;margin-bottom:8px;}
.s-avatar{width:36px;height:36px;border-radius:50%;background:var(--danger);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.9rem;flex-shrink:0;}
.s-uname{font-size:.82rem;font-weight:700;}
.s-urole{font-size:.68rem;color:var(--danger);}
.btn-out{width:100%;background:none;border:1.5px solid var(--border);color:var(--muted);padding:8px;border-radius:9px;font-family:var(--font-body);font-size:.82rem;cursor:pointer;transition:all .2s;}
.btn-out:hover{border-color:var(--danger);color:var(--danger);}

/* MAIN */
.main{margin-left:248px;flex:1;min-height:100vh;display:flex;flex-direction:column;}
.topbar{padding:18px 30px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface);position:sticky;top:0;z-index:40;transition:background .35s;}
.tb-title{font-family:var(--font-heading);font-size:1.35rem;font-weight:900;}
.tb-sub{font-size:.8rem;color:var(--muted);margin-top:2px;}
.tb-actions{display:flex;gap:8px;}
.content{padding:26px 30px;flex:1;}

/* BUTTONS */
.btn-prim{background:var(--accent);color:var(--btn-text);border:none;padding:9px 20px;border-radius:9px;font-family:var(--font-body);font-size:.85rem;font-weight:700;cursor:pointer;transition:all .2s;box-shadow:0 3px 12px var(--card-shadow);}
.btn-prim:hover{opacity:.9;transform:translateY(-1px);}
.btn-sec{background:var(--surface2);color:var(--text2);border:1.5px solid var(--border);padding:9px 20px;border-radius:9px;font-family:var(--font-body);font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s;}
.btn-sec:hover{border-color:var(--accent);color:var(--accent);}

/* STAT CARDS */
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px;margin-bottom:24px;}
.scard{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:18px;position:relative;overflow:hidden;}
.scard::after{content:attr(data-e);position:absolute;right:-6px;bottom:-8px;font-size:3.2rem;opacity:.07;}
.sc-label{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:9px;}
.sc-val{font-family:var(--font-heading);font-size:2rem;font-weight:900;color:var(--text);}
.sc-ch{font-size:.72rem;margin-top:5px;color:var(--accent2);}

/* TABLE */
.twrap{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:20px;}
.thead-row{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.t-title{font-family:var(--font-heading);font-size:.97rem;font-weight:800;}
.search{background:var(--bg2);border:1.5px solid var(--border);border-radius:8px;padding:7px 13px;color:var(--text);font-family:var(--font-body);font-size:.83rem;outline:none;width:210px;transition:border-color .2s;}
.search:focus{border-color:var(--accent);}
table{width:100%;border-collapse:collapse;}
th{padding:10px 16px;text-align:left;font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);background:var(--surface2);border-bottom:1px solid var(--border);}
td{padding:11px 16px;font-size:.85rem;border-bottom:1px solid var(--border);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:color-mix(in srgb,var(--accent) 3%,transparent);}
.badge{display:inline-flex;align-items:center;font-size:.68rem;font-weight:800;padding:3px 9px;border-radius:6px;}
.b-active{background:var(--accent-pale);color:var(--accent2);border:1px solid var(--accent-light);}
.b-inactive{background:var(--bg2);color:var(--muted);border:1px solid var(--border);}
.b-paid{background:color-mix(in srgb,var(--gold) 12%,transparent);color:var(--gold);border:1px solid color-mix(in srgb,var(--gold) 28%,transparent);}
.b-free{background:var(--accent-pale);color:var(--accent);border:1px solid var(--accent-light);}
.b-pending{background:color-mix(in srgb,var(--gold) 10%,transparent);color:var(--gold);border:1px solid color-mix(in srgb,var(--gold) 25%,transparent);}
.b-done{background:var(--accent-pale);color:var(--accent2);border:1px solid var(--accent-light);}
.b-admin{background:color-mix(in srgb,var(--danger) 10%,transparent);color:var(--danger);border:1px solid color-mix(in srgb,var(--danger) 22%,transparent);}
.abts{display:flex;gap:5px;}
.abt{padding:4px 11px;border-radius:7px;font-family:var(--font-body);font-size:.72rem;font-weight:700;cursor:pointer;border:none;transition:all .2s;}
.abt-e{background:var(--accent-pale);color:var(--accent);}
.abt-e:hover{background:var(--accent);color:#fff;}
.abt-d{background:color-mix(in srgb,var(--danger) 10%,transparent);color:var(--danger);}
.abt-d:hover{background:var(--danger);color:#fff;}
.abt-ok{background:var(--accent-pale);color:var(--accent2);}
.abt-ok:hover{background:var(--accent2);color:#fff;}

/* TABS */
.tabs{display:flex;gap:3px;background:var(--bg2);padding:4px;border-radius:11px;margin-bottom:20px;width:fit-content;}
.tab{padding:7px 16px;border-radius:8px;border:none;background:none;color:var(--muted);font-family:var(--font-body);font-size:.83rem;font-weight:600;cursor:pointer;transition:all .2s;}
.tab.active{background:var(--surface);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.08);}

/* CHARTS */
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:20px;}
.ccard{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:20px;}
.c-title{font-family:var(--font-heading);font-size:.93rem;font-weight:800;margin-bottom:18px;}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
.bar-lbl{font-size:.75rem;color:var(--muted);width:110px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bar-track{flex:1;height:7px;background:var(--bg2);border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--accent3));transition:width 1s ease;}
.bar-val{font-size:.72rem;font-weight:700;color:var(--muted);width:28px;text-align:right;}

/* ═══════════════════════════
   DİZAYN İDARƏETMƏ PANELİ
═══════════════════════════ */
.design-wrap{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.design-card{background:var(--surface);border:1.5px solid var(--border);border-radius:16px;padding:24px;}
.dc-title{font-family:var(--font-heading);font-size:1.05rem;font-weight:800;margin-bottom:6px;display:flex;align-items:center;gap:8px;}
.dc-sub{font-size:.82rem;color:var(--muted);margin-bottom:20px;line-height:1.5;}

/* Theme seçici */
.theme-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.theme-opt{border:2px solid var(--border);border-radius:12px;padding:14px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.theme-opt:hover{border-color:var(--accent3);transform:translateY(-2px);}
.theme-opt.selected{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-light);}
.theme-opt.selected::after{content:'✓';position:absolute;top:8px;right:10px;font-size:.75rem;font-weight:800;color:var(--accent);}
.to-preview{height:36px;border-radius:8px;margin-bottom:10px;display:flex;gap:4px;overflow:hidden;}
.to-swatch{flex:1;border-radius:4px;}
.to-name{font-size:.82rem;font-weight:700;color:var(--text);}
.to-emoji{font-size:1rem;margin-right:5px;}

/* Font seçici */
.font-list{display:flex;flex-direction:column;gap:8px;}
.font-opt{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border:2px solid var(--border);border-radius:11px;cursor:pointer;transition:all .2s;}
.font-opt:hover{border-color:var(--accent3);}
.font-opt.selected{border-color:var(--accent);background:var(--accent-pale);}
.fo-left{display:flex;flex-direction:column;gap:3px;}
.fo-name{font-size:.88rem;font-weight:700;color:var(--text);}
.fo-preview{font-size:1.1rem;color:var(--muted);}
.fo-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.65rem;transition:all .2s;}
.font-opt.selected .fo-check{background:var(--accent);border-color:var(--accent);color:#fff;}

/* Live preview */
.preview-box{background:var(--bg2);border:1.5px solid var(--border);border-radius:12px;padding:20px;margin-top:20px;}
.pb-title{font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:14px;}
.pb-demo{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;}
.pb-h{font-family:var(--font-heading);font-size:1.5rem;font-weight:900;color:var(--accent);margin-bottom:6px;}
.pb-p{font-family:var(--font-body);font-size:.88rem;color:var(--muted);line-height:1.6;margin-bottom:14px;}
.pb-btn{background:var(--accent);color:var(--btn-text);border:none;padding:8px 18px;border-radius:8px;font-family:var(--font-body);font-size:.83rem;font-weight:700;cursor:default;}
.pb-card{display:flex;gap:10px;align-items:center;background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:12px;margin-top:12px;}
.pb-icon{width:36px;height:36px;border-radius:8px;background:var(--accent-pale);border:1px solid var(--accent-light);display:flex;align-items:center;justify-content:center;font-size:1.1rem;}
.pb-ct{flex:1;}
.pb-ct-t{font-family:var(--font-heading);font-size:.88rem;font-weight:700;color:var(--text);margin-bottom:2px;}
.pb-ct-s{font-size:.75rem;color:var(--muted);}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-bg.open{display:flex;}
.modal{background:var(--surface);border:1.5px solid var(--border);border-radius:18px;padding:30px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;animation:fadeUp .25s ease;}
.m-title{font-family:var(--font-heading);font-size:1.15rem;font-weight:800;margin-bottom:5px;}
.m-sub{color:var(--muted);font-size:.83rem;margin-bottom:22px;}
.fg{margin-bottom:13px;}
.fl{display:block;font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);margin-bottom:6px;}
.fi{width:100%;background:var(--bg2);border:1.5px solid var(--border);border-radius:9px;padding:10px 13px;color:var(--text);font-family:var(--font-body);font-size:.88rem;outline:none;transition:border-color .2s;}
.fi:focus{border-color:var(--accent);}
.fi::placeholder{color:var(--muted);}
textarea.fi{resize:vertical;min-height:72px;}
select.fi{cursor:pointer;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.tgl-row{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;background:var(--bg2);border-radius:9px;border:1px solid var(--border);margin-bottom:10px;}
.tgl-lbl{font-size:.86rem;font-weight:600;}
.tgl{position:relative;width:42px;height:22px;}
.tgl input{display:none;}
.tgl-sl{position:absolute;inset:0;background:var(--border2);border-radius:999px;cursor:pointer;transition:.2s;}
.tgl input:checked+.tgl-sl{background:var(--accent);}
.tgl-sl::after{content:'';position:absolute;left:3px;top:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:.2s;}
.tgl input:checked+.tgl-sl::after{transform:translateX(20px);}
.m-foot{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:18px;border-top:1px solid var(--border);}
.btn-cancel{background:var(--bg2);color:var(--muted);border:1.5px solid var(--border);padding:9px 18px;border-radius:9px;font-family:var(--font-body);font-size:.85rem;cursor:pointer;transition:all .2s;}
.btn-cancel:hover{border-color:var(--danger);color:var(--danger);}
.btn-save{background:var(--accent);color:#fff;border:none;padding:9px 22px;border-radius:9px;font-family:var(--font-body);font-size:.85rem;font-weight:700;cursor:pointer;transition:all .2s;}
.btn-save:hover{opacity:.9;}

/* TOAST */
.toast{position:fixed;bottom:22px;right:22px;background:var(--surface);border:1.5px solid var(--border);border-radius:11px;padding:13px 18px;font-size:.86rem;font-weight:600;z-index:999;transform:translateY(80px);opacity:0;transition:all .3s;max-width:300px;box-shadow:0 8px 24px var(--card-shadow);}
.toast.show{transform:translateY(0);opacity:1;}
.toast.ok{border-color:var(--accent-light);color:var(--accent2);}
.toast.err{border-color:color-mix(in srgb,var(--danger) 30%,transparent);color:var(--danger);}

/* EMPTY */
.empty{text-align:center;padding:44px;color:var(--muted);}
.empty-e{font-size:2.5rem;margin-bottom:10px;}

.spin{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:36px auto;}

/* HAMBURGER */
.hamburger{display:none;position:fixed;top:14px;left:14px;z-index:100;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:8px 10px;cursor:pointer;font-size:1.2rem;box-shadow:0 2px 8px var(--card-shadow);}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:49;}
@media(max-width:768px){
  .hamburger{display:flex;}
  .sidebar{transform:translateX(-100%);transition:transform .3s;z-index:50;}
  .sidebar.open{transform:translateX(0);}
  .sidebar-overlay.open{display:block;}
  .main{margin-left:0;}
  .topbar{padding-left:56px;}
  .cgrid{grid-template-columns:1fr;}
  .design-wrap{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<!-- HAMBURGER (mobil) -->
<button class="hamburger" onclick="toggleSidebar()" id="hamburgerBtn">☰</button>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<!-- SIDEBAR -->
<aside class="sidebar">
  <a href="../index.html" class="s-logo">TestHub</a>
  <div class="s-role">⚡ Admin Panel</div>

  <div class="s-sec">Əsas</div>
  <button class="nav-btn active" data-page="dashboard"><span class="ni">📊</span>Dashboard</button>
  <button class="nav-btn" data-page="tests"><span class="ni">📝</span>Testlər</button>
  <button class="nav-btn" data-page="users"><span class="ni">👥</span>İstifadəçilər</button>

  <div class="s-sec">Maliyyə</div>
  <button class="nav-btn" data-page="payments"><span class="ni">💰</span>Ödənişlər<span class="nb" id="pendBadge" style="display:none">0</span></button>

  <div class="s-sec">Analitika</div>
  <button class="nav-btn" data-page="analytics"><span class="ni">📈</span>Statistika</button>

  <div class="s-sec">Sistem</div>
  <button class="nav-btn" data-page="design"><span class="ni">🎨</span>Dizayn & Font</button>
  <button class="nav-btn" data-page="herotext"><span class="ni">✍️</span>Mətn İdarəetməsi</button>
  <button class="nav-btn" data-page="categories"><span class="ni">📂</span>Kateqoriyalar</button>
  <button class="nav-btn" data-page="settings"><span class="ni">⚙️</span>Parametrlər</button>
  <button class="nav-btn" onclick="window.open('../index.html')"><span class="ni">🌐</span>Sayta Bax</button>

  <div class="s-bottom">
    <div class="s-user">
      <div class="s-avatar" id="sAvatar">A</div>
      <div><div class="s-uname" id="sName">Admin</div><div class="s-urole">Super Admin</div></div>
    </div>
    <button class="btn-out" onclick="logoutUser()">🚪 Çıxış</button>
  </div>
</aside>

<!-- MAIN -->
<main class="main">
  <div class="topbar">
    <div><div class="tb-title" id="tbTitle">Dashboard</div><div class="tb-sub" id="tbSub">Ümumi icmal</div></div>
    <div class="tb-actions" id="tbActions"></div>
  </div>
  <div class="content" id="mainContent"><div class="spin"></div></div>
</main>

<!-- MODAL -->
<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalBody"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="../js/firebase-config.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/theme.js"></script>
<script>
// ─── STATE ───────────────────────────
let allTests=[],allUsers=[],allPurchases=[];
let activePage='dashboard';
let activeTheme='nature', activeFont='playfair';

// ─── TOAST ───────────────────────────
function toast(msg,type='ok'){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='toast '+type+' show';
  setTimeout(()=>el.className='toast',3000);
}

// ─── MODAL ───────────────────────────
function openModal(html){document.getElementById('modalBody').innerHTML=html;document.getElementById('modalBg').classList.add('open');}
function closeModal(){document.getElementById('modalBg').classList.remove('open');}

// ─── AUTH ────────────────────────────
onAuthChange(async(user)=>{
  if(!user){window.location.href='../pages/login.html';return;}
  if(!isAdmin(user.email)){window.location.href='../index.html';return;}
  document.getElementById('sAvatar').textContent=user.email[0].toUpperCase();
  document.getElementById('sName').textContent=user.displayName||user.email;
  await loadSiteTheme();
  activeTheme=((await db.collection('settings').doc('theme').get().catch(()=>({exists:false,data:()=>({})})))?.data()?.theme)||'nature';
  activeFont=((await db.collection('settings').doc('theme').get().catch(()=>({exists:false,data:()=>({})})))?.data()?.font)||'playfair';
  await loadAll();
  // Nav click
  document.querySelectorAll('.nav-btn[data-page]').forEach(b=>{
    b.addEventListener('click',()=>showPage(b.dataset.page,b));
  });
  showPage('dashboard');
});

async function loadAll(){
  const [ts,us,ps]=await Promise.all([
    db.collection('tests').get(),
    db.collection('users').get(),
    db.collection('purchases').orderBy('createdAt','desc').get().catch(()=>({docs:[]}))
  ]);
  allTests=ts.docs.map(d=>({id:d.id,...d.data()}));
  allUsers=us.docs.map(d=>({id:d.id,...d.data()}));
  allPurchases=ps.docs.map(d=>({id:d.id,...d.data()}));

function testRows(tests){

  return tests.map(t=>`<tr>

function filterTests(f,btn){document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');const m={all:allTests,free:allTests.filter(t=>!t.isPaid),paid:allTests.filter(t=>t.isPaid)};document.getElementById('testsTb').innerHTML=testRows(m[f]);}

function updateTypeF(){
  const ty=document.getElementById('mTy').value;
  const m={
    inline:`<div class="fg"><label class="fl">Suallar JSON</label><textarea class="fi" id="mQ" rows="5" placeholder='[{"q":"?","opts":["A) ..","B) ..","C) .."],"ans":0}]'></textarea></div>`,
    forms:`<div class="fg"><label class="fl">Google Forms URL</label><input class="fi" id="mFu" placeholder="https://docs.google.com/forms/..."></div>`,
    html:`<div class="fg"><label class="fl">HTML Fayl Yolu</label><input class="fi" id="mHf" placeholder="../tests/test.html"></div>`
  };
  document.getElementById('typeFlds').innerHTML=m[ty];
}
function togglePrice(){document.getElementById('priceF').style.display=document.getElementById('mPaid').checked?'block':'none';}

async function saveTest(editId=null){
  const title=document.getElementById('mT').value.trim();
  if(!title){toast('Test adı daxil edin','err');return;}
  const ty=document.getElementById('mTy').value;
  let data={title,description:document.getElementById('mD').value,icon:document.getElementById('mI').value||'📝',category:document.getElementById('mCat').value,type:ty,questionCount:parseInt(document.getElementById('mQc').value)||0,duration:parseInt(document.getElementById('mDur').value)||0,isPaid:document.getElementById('mPaid').checked,price:parseFloat(document.getElementById('mPr')?.value)||0,isActive:document.getElementById('mAct').checked};
  if(!editId){data.createdAt=firebase.firestore.FieldValue.serverTimestamp();data.views=0;data.completions=0;}
  if(ty==='inline'){try{const q=document.getElementById('mQ')?.value;if(q)data.questions=JSON.parse(q);}catch{toast('JSON yanlışdır','err');return;}}
  else if(ty==='forms') data.formsUrl=document.getElementById('mFu')?.value;
  else data.htmlFile=document.getElementById('mHf')?.value;
  try{
    if(editId) await db.collection('tests').doc(editId).update(data);
    else await db.collection('tests').add(data);
    await loadAll(); closeModal(); renderTests();
    toast(editId?'✅ Test yeniləndi':'✅ Test əlavə edildi');
  }catch(e){toast('Xəta: '+e.message,'err');}
}

    <div class="fg"><label class="fl">Test Adı</label><input class="fi" id="mT" value="${t.title}"></div>
    <div class="fg"><label class="fl">Açıqlama</label><textarea class="fi" id="mD">${t.description||''}</textarea></div>
    <div class="frow">
      <div class="fg"><label class="fl">İkon</label><input class="fi" id="mI" value="${t.icon||'📝'}" maxlength="4"></div>
      <div class="fg"><label class="fl">Kateqoriya</label><select class="fi" id="mCat"><option value="fiziki" ${t.category==='fiziki'?'selected':''}>Fiziki Tərbiyə</option><option value="basketbol" ${t.category==='basketbol'?'selected':''}>Basketbol</option><option value="voleybol" ${t.category==='voleybol'?'selected':''}>Voleybol</option><option value="other" ${t.category==='other'?'selected':''}>Digər</option></select></div>
    </div>
    <div class="fg"><label class="fl">Test Tipi</label><select class="fi" id="mTy" onchange="updateTypeF()"><option value="inline" ${t.type==='inline'?'selected':''}>Inline</option><option value="forms" ${t.type==='forms'?'selected':''}>Google Forms</option><option value="html" ${t.type==='html'?'selected':''}>HTML Fayl</option></select></div>
    <div id="typeFlds">${t.type==='forms'?`<div class="fg"><label class="fl">Forms URL</label><input class="fi" id="mFu" value="${t.formsUrl||''}"></div>`:t.type==='html'?`<div class="fg"><label class="fl">HTML Yolu</label><input class="fi" id="mHf" value="${t.htmlFile||''}"></div>`:`<div class="fg"><label class="fl">Suallar JSON</label><textarea class="fi" id="mQ" rows="4">${t.questions?JSON.stringify(t.questions):''}</textarea></div>`}</div>
    <div class="frow">
      <div class="fg"><label class="fl">Sual Sayı</label><input class="fi" id="mQc" type="number" value="${t.questionCount||0}"></div>
      <div class="fg"><label class="fl">Müddət</label><input class="fi" id="mDur" type="number" value="${t.duration||0}"></div>
    </div>
    <div class="tgl-row"><span class="tgl-lbl">Ödənişli?</span><label class="tgl"><input type="checkbox" id="mPaid" ${t.isPaid?'checked':''} onchange="togglePrice()"><div class="tgl-sl"></div></label></div>
    <div id="priceF" style="display:${t.isPaid?'block':'none'}"><div class="fg"><label class="fl">Qiymət (₼)</label><input class="fi" id="mPr" type="number" value="${t.price||0}"></div></div>

    <div class="m-foot"><button class="btn-cancel" onclick="closeModal()">Ləğv</button><button class="btn-save" onclick="saveTest('${id}')">💾 Yenilə</button></div>`);
}

async function delTest(id,title){

  await db.collection('tests').doc(id).delete();
  await loadAll(); renderTests(); toast('🗑 Test silindi');

function selectTheme(key){
  activeTheme=key;
  document.querySelectorAll('.theme-opt').forEach(el=>el.classList.remove('selected'));
  document.getElementById('topt_'+key)?.classList.add('selected');

  toast('🎨 Mövzu seçildi: '+THEMES[key].name);
}

function selectFont(key){
  activeFont=key;
  document.querySelectorAll('.font-opt').forEach(el=>{el.classList.remove('selected');el.querySelector('.fo-check').textContent='';});
  const opt=document.getElementById('fopt_'+key);
  opt?.classList.add('selected');
  opt?.querySelector('.fo-check') && (opt.querySelector('.fo-check').textContent='✓');
  applyFont(key);
  // Önizlə
  const f=FONTS[key];
  ['pbH','pbCT'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.fontFamily=f.heading;});
  ['pbP','pbBtn'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.fontFamily=f.body;});
  toast('✍️ Font seçildi: '+f.label);
}

}

function catRows(cats){
  if(!cats.length) return `<tr><td colspan="6"><div class="empty"><div class="empty-e">📂</div>Kateqoriya yoxdur</div></td></tr>`;
  return cats.map(c=>`<tr>
    <td style="font-size:1.5rem">${c.icon||'📝'}</td>
    <td><strong>${c.name}</strong></td>
    <td><code style="background:var(--bg2);padding:2px 8px;border-radius:5px;font-size:.78rem">${c.slug}</code></td>
    <td>${c.order||0}</td>
    <td><span class="badge ${c.isActive!==false?'b-active':'b-inactive'}">${c.isActive!==false?'Aktiv':'Deaktiv'}</span></td>
    <td><div class="abts">
      <button class="abt abt-e" onclick="editCategory('${c.id}')">✏️</button>
      <button class="abt abt-d" onclick="deleteCategory('${c.id}','${c.name}')">🗑</button>
    </div></td>
  </tr>`).join('');
}

function openAddCategory(){
  openModal(`<div class="m-title">+ Yeni Kateqoriya</div><div class="m-sub">Test kateqoriyası əlavə edin</div>
    <div class="frow">
      <div class="fg"><label class="fl">İkon (emoji)</label><input class="fi" id="catI" placeholder="📝" maxlength="4"></div>
      <div class="fg"><label class="fl">Sıra (1,2,3...)</label><input class="fi" id="catOrd" type="number" placeholder="1" value="1"></div>
    </div>
    <div class="fg"><label class="fl">Ad *</label><input class="fi" id="catN" placeholder="Fiziki Tərbiyə" oninput="autoSlug(this.value)"></div>
    <div class="fg"><label class="fl">Slug (URL üçün)</label><input class="fi" id="catS" placeholder="fiziki-terbiye"></div>
    <div class="fg"><label class="fl">Açıqlama</label><input class="fi" id="catD" placeholder="Qısa açıqlama..."></div>

    <div class="m-foot"><button class="btn-cancel" onclick="closeModal()">Ləğv</button><button class="btn-save" onclick="saveCategory()">💾 Saxla</button></div>`);
}

function autoSlug(name){
  const slug=name.toLowerCase()
    .replace(/ə/g,'e').replace(/ö/g,'o').replace(/ü/g,'u').replace(/ğ/g,'g')
    .replace(/ş/g,'s').replace(/ç/g,'c').replace(/ı/g,'i')
    .replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
  const el=document.getElementById('catS');
  if(el) el.value=slug;
}

async function saveCategory(editId=null){
  const name=document.getElementById('catN').value.trim();
  if(!name){toast('Ad daxil edin','err');return;}
  const data={
    name, icon:document.getElementById('catI').value||'📝',
    slug:document.getElementById('catS').value||name.toLowerCase(),
    description:document.getElementById('catD').value,
    order:parseInt(document.getElementById('catOrd').value)||1,
    isActive:document.getElementById('catAct').checked,
  };
  if(!editId) data.createdAt=firebase.firestore.FieldValue.serverTimestamp();
  try{
    if(editId) await db.collection('categories').doc(editId).update(data);
    else await db.collection('categories').add(data);
    closeModal(); await renderCategories();
    toast(editId?'✅ Kateqoriya yeniləndi':'✅ Kateqoriya əlavə edildi');
  }catch(e){toast('Xəta: '+e.message,'err');}
}

async function editCategory(id){
  const c=allCategories.find(x=>x.id===id);if(!c)return;
  openModal(`<div class="m-title">✏️ Kateqoriya Redaktəsi</div><div class="m-sub">${c.name}</div>
    <div class="frow">
      <div class="fg"><label class="fl">İkon</label><input class="fi" id="catI" value="${c.icon||'📝'}" maxlength="4"></div>
      <div class="fg"><label class="fl">Sıra</label><input class="fi" id="catOrd" type="number" value="${c.order||1}"></div>
    </div>
    <div class="fg"><label class="fl">Ad</label><input class="fi" id="catN" value="${c.name}"></div>
    <div class="fg"><label class="fl">Slug</label><input class="fi" id="catS" value="${c.slug}"></div>
    <div class="fg"><label class="fl">Açıqlama</label><input class="fi" id="catD" value="${c.description||''}"></div>
    <div class="tgl-row"><span class="tgl-lbl">Aktiv?</span><label class="tgl"><input type="checkbox" id="catAct" ${c.isActive!==false?'checked':''}><div class="tgl-sl"></div></label></div>
    <div class="m-foot"><button class="btn-cancel" onclick="closeModal()">Ləğv</button><button class="btn-save" onclick="saveCategory('${id}')">💾 Yenilə</button></div>`);
}

async function deleteCategory(id,name){
  if(!confirm(`"${name}" kateqoriyasını silmək istəyirsiniz?\n\nDiqqət: Bu kateqoriyaya aid testlər silinməyəcək.`))return;
  await db.collection('categories').doc(id).delete();
  await renderCategories();
  toast('🗑 Kateqoriya silindi');
}

  const fields={
    payriff:`<div class="fg"><label class="fl">PayRiff Public Key</label><input class="fi" id="sPayPub" placeholder="pk_live_..."></div>
      <div class="fg"><label class="fl">PayRiff Secret Key</label><input class="fi" id="sPaySec" placeholder="sk_live_..." type="password"></div>
      <div class="fg"><label class="fl">Merchant ID</label><input class="fi" id="sPayMid" placeholder="merchant_xxx"></div>`,
    azericard:`<div class="fg"><label class="fl">AzeriCard Merchant ID</label><input class="fi" id="sPayPub" placeholder="merchant_id"></div>
      <div class="fg"><label class="fl">AzeriCard Secret Key</label><input class="fi" id="sPaySec" placeholder="secret_key" type="password"></div>
      <div class="fg"><label class="fl">Terminal ID</label><input class="fi" id="sPayMid" placeholder="terminal_xxx"></div>`,
    manual:`<div style="padding:14px;background:var(--bg2);border-radius:9px;font-size:.83rem;color:var(--muted);text-align:center">Yalnız bank köçürməsi aktiv</div>`
  };
  document.getElementById('payKeyFields').innerHTML=fields[sys];
}

function toggleSidebar(){
  const sb=document.querySelector('.sidebar');
  const ov=document.getElementById('sidebarOverlay');
  sb.classList.toggle('open');
  ov.classList.toggle('open');
}

async function saveSettings(){
  try{
    const payData={
      iban:document.getElementById('sIban').value,
      owner:document.getElementById('sOwner').value,
      bank:document.getElementById('sBank').value,
      siteName:document.getElementById('sSite').value,
      contact:document.getElementById('sCont').value,
      siteUrl:document.getElementById('sUrl').value,
      paySystem:document.getElementById('sPaySys').value,
      payPublicKey:document.getElementById('sPayPub')?.value||'',
      paySecretKey:document.getElementById('sPaySec')?.value||'',
      payMerchantId:document.getElementById('sPayMid')?.value||'',
      guestView:document.getElementById('sGuestView')?.checked !== false,
      guestStart:document.getElementById('sGuestStart')?.checked === true,
      showBank:document.getElementById('sShowBank')?.checked !== false,
      showCard:document.getElementById('sShowCard')?.checked === true,
    };
    await db.collection('settings').doc('payment').set(payData,{merge:true});
    toast('✅ Parametrlər saxlanıldı');
  }catch(e){toast('Xəta: '+e.message,'err');}
}
</script>
