<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel — TestHub</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c28;--border:#2a2a3a;--accent:#6c63ff;--accent2:#ff6584;--accent3:#43e97b;--text:#f0f0ff;--muted:#8888aa;--gold:#ffd700;--danger:#ff4757;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.layout{display:flex;min-height:100vh;}

/* SIDEBAR */
.sidebar{width:250px;background:var(--surface);border-right:1px solid var(--border);padding:20px 14px;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:50;overflow-y:auto;}
.sidebar-logo{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;padding:8px 12px;text-decoration:none;display:block;}
.sidebar-sub{font-size:0.7rem;color:var(--danger);font-weight:700;text-transform:uppercase;letter-spacing:0.1em;padding:0 12px;margin-bottom:24px;}
.nav-section{font-size:0.65rem;font-weight:800;text-transform:uppercase;letter-spacing:0.12em;color:var(--muted);padding:0 12px;margin:16px 0 6px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;color:var(--muted);text-decoration:none;font-size:0.88rem;font-weight:500;transition:all 0.2s;margin-bottom:2px;cursor:pointer;background:none;border:none;width:100%;text-align:left;font-family:'DM Sans',sans-serif;}
.nav-item:hover{background:var(--surface2);color:var(--text);}
.nav-item.active{background:rgba(108,99,255,0.15);color:var(--accent);font-weight:700;}
.nav-badge{margin-left:auto;background:var(--accent2);color:white;font-size:0.65rem;font-weight:800;padding:2px 7px;border-radius:999px;}
.nav-icon{font-size:1rem;width:20px;text-align:center;}
.sidebar-bottom{margin-top:auto;padding-top:16px;border-top:1px solid var(--border);}
.admin-info{display:flex;align-items:center;gap:10px;padding:10px 12px;margin-bottom:8px;}
.admin-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--danger),#ff6348);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:0.9rem;flex-shrink:0;}
.admin-name{font-size:0.82rem;font-weight:700;}
.admin-role{font-size:0.7rem;color:var(--danger);}
.btn-logout{width:100%;background:none;border:1px solid var(--border);color:var(--muted);padding:8px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:0.82rem;cursor:pointer;transition:all 0.2s;}
.btn-logout:hover{border-color:var(--danger);color:var(--danger);}

/* MAIN */
.main{margin-left:250px;flex:1;min-height:100vh;}
.topbar{padding:20px 32px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface);position:sticky;top:0;z-index:40;}
.page-title{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;}
.page-sub{font-size:0.82rem;color:var(--muted);margin-top:2px;}
.topbar-actions{display:flex;gap:10px;}
.btn-primary{background:linear-gradient(135deg,var(--accent),#8b7fff);color:white;border:none;padding:9px 20px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:0.85rem;font-weight:700;cursor:pointer;transition:all 0.2s;}
.btn-primary:hover{transform:translateY(-1px);}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);padding:9px 20px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:0.85rem;font-weight:600;cursor:pointer;transition:all 0.2s;}
.btn-secondary:hover{border-color:var(--accent);}
.content{padding:28px 32px;}

/* STAT CARDS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:28px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;position:relative;overflow:hidden;}
.stat-card::after{content:attr(data-emoji);position:absolute;right:-8px;bottom:-8px;font-size:3.5rem;opacity:0.08;}
.stat-label{font-size:0.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;}
.stat-val{font-family:'Syne',sans-serif;font-size:2.2rem;font-weight:800;}
.stat-change{font-size:0.75rem;margin-top:6px;}
.stat-up{color:var(--accent3);}
.stat-down{color:var(--accent2);}

/* TABLE */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:24px;}
.table-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.table-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;}
.search-input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.85rem;outline:none;width:220px;}
.search-input:focus{border-color:var(--accent);}
table{width:100%;border-collapse:collapse;}
th{padding:11px 18px;text-align:left;font-size:0.72rem;font-weight:800;text-transform:uppercase;letter-spacing:0.09em;color:var(--muted);background:var(--surface2);border-bottom:1px solid var(--border);}
td{padding:12px 18px;font-size:0.87rem;border-bottom:1px solid var(--border);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,0.02);}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:0.72rem;font-weight:700;padding:4px 10px;border-radius:999px;}
.badge-active{background:rgba(67,233,123,0.12);color:var(--accent3);border:1px solid rgba(67,233,123,0.25);}
.badge-inactive{background:rgba(136,136,170,0.1);color:var(--muted);border:1px solid var(--border);}
.badge-paid{background:rgba(255,215,0,0.1);color:var(--gold);border:1px solid rgba(255,215,0,0.2);}
.badge-free{background:rgba(108,99,255,0.1);color:var(--accent);border:1px solid rgba(108,99,255,0.2);}
.badge-pending{background:rgba(255,215,0,0.1);color:var(--gold);border:1px solid rgba(255,215,0,0.2);}
.badge-completed{background:rgba(67,233,123,0.12);color:var(--accent3);border:1px solid rgba(67,233,123,0.25);}
.badge-admin{background:rgba(255,71,87,0.12);color:var(--danger);border:1px solid rgba(255,71,87,0.25);}
.badge-user{background:rgba(108,99,255,0.1);color:var(--accent);border:1px solid rgba(108,99,255,0.2);}
.action-btns{display:flex;gap:6px;}
.btn-sm{padding:5px 12px;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:0.75rem;font-weight:700;cursor:pointer;border:none;transition:all 0.2s;}
.btn-edit{background:rgba(108,99,255,0.15);color:var(--accent);}
.btn-edit:hover{background:var(--accent);color:white;}
.btn-delete{background:rgba(255,71,87,0.12);color:var(--danger);}
.btn-delete:hover{background:var(--danger);color:white;}
.btn-approve{background:rgba(67,233,123,0.12);color:var(--accent3);}
.btn-approve:hover{background:var(--accent3);color:#0a0a0f;}
.btn-view{background:rgba(255,215,0,0.1);color:var(--gold);}
.btn-view:hover{background:var(--gold);color:#0a0a0f;}

/* CHART */
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px;}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;}
.chart-title{font-family:'Syne',sans-serif;font-size:0.95rem;font-weight:800;margin-bottom:20px;}
.bar-chart{display:flex;flex-direction:column;gap:10px;}
.bar-row{display:flex;align-items:center;gap:12px;}
.bar-label{font-size:0.78rem;color:var(--muted);width:120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bar-track{flex:1;height:8px;background:var(--surface2);border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),#8b7fff);transition:width 1s ease;}
.bar-val{font-size:0.75rem;font-weight:700;color:var(--muted);width:32px;text-align:right;}
.donut-wrap{display:flex;align-items:center;gap:24px;}
.donut-legend{display:flex;flex-direction:column;gap:8px;}
.legend-item{display:flex;align-items:center;gap:8px;font-size:0.8rem;}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:32px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;}
.modal-title{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:800;margin-bottom:6px;}
.modal-sub{color:var(--muted);font-size:0.85rem;margin-bottom:24px;}
.form-group{margin-bottom:14px;}
.form-label{display:block;font-size:0.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:7px;}
.form-input{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.9rem;outline:none;transition:border-color 0.2s;}
.form-input:focus{border-color:var(--accent);}
.form-input::placeholder{color:var(--muted);}
textarea.form-input{resize:vertical;min-height:80px;}
select.form-input{cursor:pointer;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.toggle-group{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--surface2);border-radius:10px;border:1px solid var(--border);}
.toggle-label{font-size:0.88rem;font-weight:600;}
.toggle{position:relative;width:44px;height:24px;}
.toggle input{display:none;}
.toggle-slider{position:absolute;inset:0;background:var(--border);border-radius:999px;cursor:pointer;transition:0.2s;}
.toggle input:checked+.toggle-slider{background:var(--accent);}
.toggle-slider::after{content:'';position:absolute;left:3px;top:3px;width:18px;height:18px;border-radius:50%;background:white;transition:0.2s;}
.toggle input:checked+.toggle-slider::after{transform:translateX(20px);}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:24px;padding-top:20px;border-top:1px solid var(--border);}
.btn-cancel{background:var(--surface2);color:var(--muted);border:1px solid var(--border);padding:10px 20px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:0.88rem;cursor:pointer;transition:all 0.2s;}
.btn-cancel:hover{border-color:var(--accent2);color:var(--accent2);}
.btn-save{background:linear-gradient(135deg,var(--accent),#8b7fff);color:white;border:none;padding:10px 24px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:0.88rem;font-weight:700;cursor:pointer;transition:all 0.2s;}
.btn-save:hover{transform:translateY(-1px);}

/* TABS */
.tab-nav{display:flex;gap:4px;background:var(--surface2);padding:4px;border-radius:12px;margin-bottom:24px;width:fit-content;}
.tab-btn{padding:8px 18px;border-radius:9px;border:none;background:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:0.85rem;font-weight:600;cursor:pointer;transition:all 0.2s;}
.tab-btn.active{background:var(--surface);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,0.3);}

/* EMPTY */
.empty{text-align:center;padding:48px;color:var(--muted);}
.empty-emoji{font-size:2.5rem;margin-bottom:12px;}

/* Spinner */
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:40px auto;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ALERT */
.toast{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 20px;font-size:0.88rem;font-weight:600;z-index:999;transform:translateY(100px);opacity:0;transition:all 0.3s;max-width:320px;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.success{border-color:rgba(67,233,123,0.4);color:var(--accent3);}
.toast.error{border-color:rgba(255,71,87,0.4);color:var(--danger);}

/* Settings */
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.settings-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;}
.settings-card-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;margin-bottom:16px;display:flex;align-items:center;gap:8px;}

@media(max-width:768px){
  .sidebar{display:none;}
  .main{margin-left:0;}
  .chart-grid{grid-template-columns:1fr;}
  .settings-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <a href="../index.html" class="sidebar-logo">TestHub</a>
    <div class="sidebar-sub">⚙️ Admin Panel</div>

    <div class="nav-section">Əsas</div>
    <button class="nav-item active" onclick="showPage('dashboard')"><span class="nav-icon">📊</span> Dashboard</button>
    <button class="nav-item" onclick="showPage('tests')"><span class="nav-icon">📝</span> Testlər</button>
    <button class="nav-item" onclick="showPage('users')"><span class="nav-icon">👥</span> İstifadəçilər</button>

    <div class="nav-section">Maliyyə</div>
    <button class="nav-item" onclick="showPage('payments')" id="navPayments"><span class="nav-icon">💰</span> Ödənişlər <span class="nav-badge" id="pendingBadge" style="display:none">0</span></button>

    <div class="nav-section">Analitika</div>
    <button class="nav-item" onclick="showPage('analytics')"><span class="nav-icon">📈</span> Statistika</button>

    <div class="nav-section">Sistem</div>
    <button class="nav-item" onclick="showPage('settings')"><span class="nav-icon">⚙️</span> Parametrlər</button>
    <button class="nav-item" onclick="window.open('../index.html')"><span class="nav-icon">🌐</span> Sayta Bax</button>

    <div class="sidebar-bottom">
      <div class="admin-info">
        <div class="admin-avatar" id="adminAvatar">A</div>
        <div>
          <div class="admin-name" id="adminName">Admin</div>
          <div class="admin-role">⚡ Super Admin</div>
        </div>
      </div>
      <button class="btn-logout" onclick="logoutUser()">🚪 Çıxış</button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="topbar">
      <div>
        <div class="page-title" id="pageTitle">Dashboard</div>
        <div class="page-sub" id="pageSub">TestHub idarəetmə paneli</div>
      </div>
      <div class="topbar-actions" id="topbarActions"></div>
    </div>
    <div class="content" id="mainContent">
      <div class="spinner"></div>
    </div>
  </main>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalBody"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="../js/firebase-config.js"></script>
<script src="../js/auth.js"></script>
<script>
let currentPage = 'dashboard';
let allTests = [], allUsers = [], allPurchases = [];

// Toast
function toast(msg, type='success') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast ' + type + ' show';
  setTimeout(() => el.className = 'toast', 3000);
}

// Modal
function openModal(html) {
  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

// Auth check
onAuthChange(async (user) => {
  if (!user) { window.location.href = '../pages/login.html'; return; }
  if (!isAdmin(user.email)) { window.location.href = '../index.html'; return; }
  document.getElementById('adminAvatar').textContent = user.email[0].toUpperCase();
  document.getElementById('adminName').textContent = user.displayName || user.email;
  await loadAllData();
  showPage('dashboard');
});

async function loadAllData() {
  const [testsSnap, usersSnap, purchSnap] = await Promise.all([
    db.collection('tests').get(),
    db.collection('users').get(),
    db.collection('purchases').orderBy('createdAt','desc').get()
  ]);
  allTests = testsSnap.docs.map(d => ({id:d.id,...d.data()}));
  allUsers = usersSnap.docs.map(d => ({id:d.id,...d.data()}));
  allPurchases = purchSnap.docs.map(d => ({id:d.id,...d.data()}));

  const pending = allPurchases.filter(p => p.status === 'pending').length;
  const badge = document.getElementById('pendingBadge');
  if (pending > 0) { badge.textContent = pending; badge.style.display = 'inline'; }
  else badge.style.display = 'none';
}

function showPage(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  event?.target?.classList?.add('active');
  const titles = { dashboard:'Dashboard', tests:'Testlər', users:'İstifadəçilər', payments:'Ödənişlər', analytics:'Statistika', settings:'Parametrlər' };
  const subs = { dashboard:'Ümumi icmal', tests:'Test idarəetməsi', users:'İstifadəçi idarəetməsi', payments:'Ödəniş idarəetməsi', analytics:'Analitika və statistika', settings:'Sistem parametrləri' };
  document.getElementById('pageTitle').textContent = titles[page];
  document.getElementById('pageSub').textContent = subs[page];
  const actions = document.getElementById('topbarActions');
  actions.innerHTML = '';
  if (page === 'tests') actions.innerHTML = '<button class="btn-primary" onclick="openAddTest()">+ Test Əlavə Et</button>';
  if (page === 'settings') actions.innerHTML = '<button class="btn-primary" onclick="saveSettings()">💾 Saxla</button>';

  const pages = { dashboard: renderDashboard, tests: renderTests, users: renderUsers, payments: renderPayments, analytics: renderAnalytics, settings: renderSettings };
  pages[page]?.();
}

// ============ DASHBOARD ============
function renderDashboard() {
  const totalRevenue = allPurchases.filter(p=>p.status==='completed').reduce((a,p)=>a+(p.amount||0),0);
  const pending = allPurchases.filter(p=>p.status==='pending').length;
  const resultsPromise = db.collection('results').get();

  document.getElementById('mainContent').innerHTML = `
    <div class="stats-grid">
      <div class="stat-card" data-emoji="📝">
        <div class="stat-label">Ümumi Test</div>
        <div class="stat-val">${allTests.length}</div>
        <div class="stat-change stat-up">↑ ${allTests.filter(t=>t.isActive).length} aktiv</div>
      </div>
      <div class="stat-card" data-emoji="👥">
        <div class="stat-label">İstifadəçilər</div>
        <div class="stat-val">${allUsers.length}</div>
        <div class="stat-change stat-up">↑ Bu ay</div>
      </div>
      <div class="stat-card" data-emoji="💰">
        <div class="stat-label">Gəlir (₼)</div>
        <div class="stat-val">${totalRevenue.toFixed(0)}</div>
        <div class="stat-change ${pending>0?'stat-up':''}">⏳ ${pending} gözləyir</div>
      </div>
      <div class="stat-card" data-emoji="🛍">
        <div class="stat-label">Satış</div>
        <div class="stat-val">${allPurchases.filter(p=>p.status==='completed').length}</div>
        <div class="stat-change stat-up">Tamamlanan</div>
      </div>
    </div>

    <div class="chart-grid">
      <div class="chart-card">
        <div class="chart-title">📝 Test Populyarlığı</div>
        <div class="bar-chart">
          ${allTests.slice(0,6).map(t=>`
            <div class="bar-row">
              <div class="bar-label">${t.title}</div>
              <div class="bar-track"><div class="bar-fill" style="width:${Math.min(100,(t.views||0)/Math.max(1,Math.max(...allTests.map(x=>x.views||0)))*100)}%"></div></div>
              <div class="bar-val">${t.views||0}</div>
            </div>`).join('')}
        </div>
      </div>
      <div class="chart-card">
        <div class="chart-title">💳 Ödəniş Vəziyyəti</div>
        <div class="donut-wrap">
          <svg width="120" height="120" viewBox="0 0 120 120">
            ${donutChart(allPurchases)}
          </svg>
          <div class="donut-legend">
            <div class="legend-item"><div class="legend-dot" style="background:var(--accent3)"></div>Tamamlanan: ${allPurchases.filter(p=>p.status==='completed').length}</div>
            <div class="legend-item"><div class="legend-dot" style="background:var(--gold)"></div>Gözləyir: ${allPurchases.filter(p=>p.status==='pending').length}</div>
            <div class="legend-item"><div class="legend-dot" style="background:var(--accent2)"></div>Ləğv: ${allPurchases.filter(p=>p.status==='cancelled').length}</div>
          </div>
        </div>
      </div>
    </div>

    <div class="table-wrap">
      <div class="table-header">
        <div class="table-title">🕐 Son Ödənişlər</div>
        <button class="btn-secondary" onclick="showPage('payments')">Hamısına Bax →</button>
      </div>
      <table>

            <td><span class="badge badge-${p.status==='completed'?'completed':p.status==='pending'?'pending':'inactive'}">${p.status==='completed'?'✓ Tamamlandı':p.status==='pending'?'⏳ Gözləyir':'Ləğv'}</span></td>
          </tr>`).join('') || '<tr><td colspan="5" class="empty">Ödəniş yoxdur</td></tr>'}
        </tbody>
      </table>

}

function donutChart(purchases) {
  const completed = purchases.filter(p=>p.status==='completed').length;
  const pending = purchases.filter(p=>p.status==='pending').length;
  const total = Math.max(completed + pending, 1);
  const r = 45; const cx = 60; const cy = 60;
  const circumference = 2 * Math.PI * r;
  const c1 = (completed/total) * circumference;
  const c2 = (pending/total) * circumference;
  return `
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--border)" stroke-width="14"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--accent3)" stroke-width="14" stroke-dasharray="${c1} ${circumference}" stroke-dashoffset="${circumference/4}" transform="rotate(-90 ${cx} ${cy})"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--gold)" stroke-width="14" stroke-dasharray="${c2} ${circumference}" stroke-dashoffset="${circumference/4-c1}" transform="rotate(-90 ${cx} ${cy})"/>
    <text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="middle" fill="var(--text)" font-family="Syne" font-size="18" font-weight="800">${total}</text>`;
}

async function saveTest(editId=null) {
  const title = document.getElementById('mTitle').value.trim();
  if (!title) { toast('Test adı daxil edin', 'error'); return; }
  const type = document.getElementById('mType').value;
  let data = {
    title,
    description: document.getElementById('mDesc').value,
    icon: document.getElementById('mIcon').value || '📝',
    category: document.getElementById('mCategory').value,
    type,
    questionCount: parseInt(document.getElementById('mQCount').value) || 0,
    duration: parseInt(document.getElementById('mDuration').value) || 0,
    isPaid: document.getElementById('mIsPaid').checked,
    price: parseFloat(document.getElementById('mPrice')?.value) || 0,
    isActive: document.getElementById('mActive').checked,
    views: editId ? undefined : 0,
    completions: editId ? undefined : 0,
  };
  if (!editId) { data.createdAt = firebase.firestore.FieldValue.serverTimestamp(); }

  if (type === 'inline') {
    try {
      const q = document.getElementById('mQuestions').value;
      if (q) data.questions = JSON.parse(q);
    } catch(e) { toast('JSON formatı yanlışdır', 'error'); return; }
  } else if (type === 'forms') {
    data.formsUrl = document.getElementById('mFormsUrl').value;
  } else {
    data.htmlFile = document.getElementById('mHtmlFile').value;
  }

  // undefined sahələri sil
  Object.keys(data).forEach(k => data[k] === undefined && delete data[k]);

  try {
    if (editId) await db.collection('tests').doc(editId).update(data);
    else await db.collection('tests').add(data);
    await loadAllData();
    closeModal();
    renderTests();
    toast(editId ? '✅ Test yeniləndi' : '✅ Test əlavə edildi');
  } catch(e) { toast('Xəta: ' + e.message, 'error'); }
}

      <div class="stat-card" data-emoji="🛍"><div class="stat-label">Satılan Test</div><div class="stat-val">${allPurchases.filter(p=>p.status==='completed').length}</div></div>
    </div>

      <div class="chart-card">
        <div class="chart-title">📝 Test Performansı</div>
        <div class="bar-chart">
          ${allTests.map(t=>{
            const tResults = results.filter(r=>r.testId===t.id);
            const avg = tResults.length ? Math.round(tResults.reduce((a,r)=>a+r.percentage,0)/tResults.length) : 0;
            return `<div class="bar-row">
              <div class="bar-label">${t.title}</div>
              <div class="bar-track"><div class="bar-fill" style="width:${avg}%;background:${avg>=70?'var(--accent3)':avg>=40?'var(--gold)':'var(--accent2)'}"></div></div>
              <div class="bar-val">${avg}%</div>
            </div>`;
          }).join('')}
        </div>
      </div>
      <div class="chart-card">
        <div class="chart-title">💰 Gəlir Bölgüsü</div>
        <div class="bar-chart">
          ${allTests.filter(t=>t.isPaid).map(t=>{
            const rev = allPurchases.filter(p=>p.testId===t.id&&p.status==='completed').length * (t.price||0);
            const maxRev = Math.max(...allTests.filter(x=>x.isPaid).map(x=>allPurchases.filter(p=>p.testId===x.id&&p.status==='completed').length*(x.price||0)), 1);
            return `<div class="bar-row">
              <div class="bar-label">${t.title}</div>
              <div class="bar-track"><div class="bar-fill" style="width:${rev/maxRev*100}%;background:var(--gold)"></div></div>
              <div class="bar-val">${rev}₼</div>
            </div>`;
          }).join('') || '<div style="color:var(--muted);font-size:0.85rem">Ödənişli test yoxdur</div>'}
        </div>
      </div>
    </div>`;
}

// ============ SETTINGS ============
async function renderSettings() {
  const settingsDoc = await db.collection('settings').doc('payment').get();
  const settings = settingsDoc.exists ? settingsDoc.data() : {};
  document.getElementById('mainContent').innerHTML = `
    <div class="settings-grid">
      <div class="settings-card">
        <div class="settings-card-title">🏦 Ödəniş Məlumatları</div>
        <div class="form-group"><label class="form-label">Bank IBAN</label>
          <input class="form-input" id="sIban" value="${settings.iban||''}" placeholder="AZ00 UBRZ ..."></div>
        <div class="form-group"><label class="form-label">Hesab Sahibi</label>
          <input class="form-input" id="sOwner" value="${settings.owner||''}" placeholder="Ad Soyad / Şirkət adı"></div>
        <div class="form-group"><label class="form-label">Bank Adı</label>
          <input class="form-input" id="sBank" value="${settings.bank||''}" placeholder="UNIBANK, ABB və s."></div>
      </div>
      <div class="settings-card">
        <div class="settings-card-title">🌐 Sayt Məlumatları</div>
        <div class="form-group"><label class="form-label">Sayt Adı</label>
          <input class="form-input" id="sSiteName" value="${settings.siteName||'TestHub'}" placeholder="TestHub"></div>
        <div class="form-group"><label class="form-label">Admin Emailləri (vergüllə)</label>
          <input class="form-input" id="sAdmins" value="${ADMIN_EMAILS.join(', ')}" placeholder="admin@test.com"></div>
        <div class="form-group"><label class="form-label">İletişim Email</label>
          <input class="form-input" id="sContact" value="${settings.contact||''}" placeholder="info@testhub.az"></div>
      </div>
    </div>`;
}

async function saveSettings() {
  try {
    await db.collection('settings').doc('payment').set({
      iban: document.getElementById('sIban').value,
      owner: document.getElementById('sOwner').value,
      bank: document.getElementById('sBank').value,
      siteName: document.getElementById('sSiteName').value,
      contact: document.getElementById('sContact').value,
    }, { merge: true });
    toast('✅ Parametrlər saxlanıldı');
  } catch(e) { toast('Xəta: ' + e.message, 'error'); }
}
</script>
