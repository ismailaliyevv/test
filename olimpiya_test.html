<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fiziki Tərbiyə Testi</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #3b82f6;
    --primary-light: #eff6ff;
    --primary-dark: #1d4ed8;
    --success: #16a34a;
    --success-light: #f0fdf4;
    --success-border: #86efac;
    --danger: #dc2626;
    --danger-light: #fef2f2;
    --danger-border: #fca5a5;
    --bg: #f1f5f9;
    --card: #ffffff;
    --text: #0f172a;
    --muted: #64748b;
    --border: #e2e8f0;
    --nav-size: 48px;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  .header {
    background: white;
    border-bottom: 2px solid var(--border);
    padding: 14px 24px 18px;
    position: sticky;
    top: 0;
    z-index: 200;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    position: relative;
  }
  .header-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.25rem;
    color: var(--primary-dark);
    flex: 1;
  }
  .score-pill {
    background: var(--primary-light);
    color: var(--primary-dark);
    font-weight: 800;
    font-size: 0.95rem;
    padding: 6px 18px;
    border-radius: 999px;
    border: 2px solid var(--primary);
    white-space: nowrap;
  }
  .progress-bar-wrap {
    width: 100%;
    height: 4px;
    background: var(--border);
    position: absolute;
    bottom: 0;
    left: 0;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--primary), #60a5fa);
    transition: width 0.4s ease;
  }
  .nav-section {
    background: white;
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
  }
  .nav-label {
    font-size: 0.7rem;
    font-weight: 800;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 10px;
  }
  .nav-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }
  .nav-btn {
    width: var(--nav-size);
    height: var(--nav-size);
    border: 2px solid var(--border);
    background: white;
    border-radius: 8px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 0.8rem;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .nav-btn:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
  .nav-btn.current { border-color: var(--primary); background: var(--primary); color: white; }
  .nav-btn.correct { border-color: var(--success); background: var(--success-light); color: var(--success); }
  .nav-btn.wrong { border-color: var(--danger); background: var(--danger-light); color: var(--danger); }
  .main {
    max-width: 780px;
    margin: 0 auto;
    padding: 28px 16px 60px;
  }
  .question-card {
    background: white;
    border-radius: var(--radius);
    padding: 28px;
    box-shadow: 0 2px 20px rgba(0,0,0,0.07);
    border: 2px solid var(--border);
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .q-number {
    font-size: 0.72rem;
    font-weight: 800;
    color: var(--primary);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 10px;
  }
  .q-text {
    font-size: 1.05rem;
    font-weight: 700;
    line-height: 1.6;
    color: var(--text);
    margin-bottom: 22px;
    white-space: pre-wrap;
  }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    border: 2px solid var(--border);
    border-radius: 10px;
    background: white;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text);
    text-align: left;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }
  .option-btn:hover:not(:disabled) {
    border-color: var(--primary);
    background: var(--primary-light);
    transform: translateX(3px);
  }
  .option-btn:disabled { cursor: default; }
  .option-letter {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 0.85rem;
    color: var(--muted);
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .option-text { flex: 1; }
  .option-icon {
    font-size: 1.2rem;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .option-btn.correct {
    border-color: var(--success);
    background: var(--success-light);
    animation: correctPop 0.4s ease;
  }
  .option-btn.correct .option-letter { background: var(--success); color: white; }
  .option-btn.correct .option-icon { opacity: 1; }
  @keyframes correctPop {
    0% { transform: scale(1); }
    40% { transform: scale(1.03); }
    100% { transform: scale(1); }
  }
  .option-btn.wrong {
    border-color: var(--danger);
    background: var(--danger-light);
    animation: wrongShake 0.4s ease;
  }
  .option-btn.wrong .option-letter { background: var(--danger); color: white; }
  .option-btn.wrong .option-icon { opacity: 1; }
  @keyframes wrongShake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }
  .option-btn.show-correct {
    border-color: var(--success);
    background: var(--success-light);
  }
  .option-btn.show-correct .option-letter { background: var(--success); color: white; }
  .option-btn.show-correct .option-icon { opacity: 1; }
  .feedback {
    margin-top: 16px;
    padding: 12px 18px;
    border-radius: 10px;
    font-weight: 700;
    font-size: 0.95rem;
    align-items: center;
    gap: 10px;
    display: none;
  }
  .feedback.correct { background: var(--success-light); border: 2px solid var(--success-border); color: var(--success); display: flex; }
  .feedback.wrong { background: var(--danger-light); border: 2px solid var(--danger-border); color: var(--danger); display: flex; }
  .nav-controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 24px;
    gap: 12px;
  }
  .btn {
    padding: 12px 28px;
    border-radius: 10px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.15s;
    border: none;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .btn-back {
    background: white;
    color: var(--muted);
    border: 2px solid var(--border);
  }
  .btn-back:hover:not(:disabled) { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
  .btn-back:disabled { opacity: 0.3; cursor: default; }
  .btn-next {
    background: var(--primary);
    color: white;
    box-shadow: 0 4px 12px rgba(59,130,246,0.35);
  }
  .btn-next:hover { background: var(--primary-dark); transform: translateY(-1px); }
  .q-counter { font-size: 0.85rem; font-weight: 700; color: var(--muted); }
  .result-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    padding: 60px 20px;
    text-align: center;
  }
  .result-emoji { font-size: 5rem; margin-bottom: 16px; animation: bounce 0.6s ease; }
  @keyframes bounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-20px); }
  }
  .result-title {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    color: var(--text);
    margin-bottom: 8px;
  }
  .result-score { font-size: 3.5rem; font-weight: 900; color: var(--primary); margin-bottom: 8px; }
  .result-sub { font-size: 1rem; color: var(--muted); margin-bottom: 32px; font-weight: 600; }
  .result-stats { display: flex; gap: 20px; margin-bottom: 32px; flex-wrap: wrap; justify-content: center; }
  .stat-box { background: white; border: 2px solid var(--border); border-radius: var(--radius); padding: 18px 28px; min-width: 120px; }
  .stat-val { font-size: 2rem; font-weight: 900; }
  .stat-val.green { color: var(--success); }
  .stat-val.red { color: var(--danger); }
  .stat-val.orange { color: #f59e0b; }
  .stat-label { font-size: 0.8rem; font-weight: 700; color: var(--muted); margin-top: 4px; }
  .btn-restart {
    background: var(--primary);
    color: white;
    border: none;
    padding: 14px 40px;
    border-radius: 12px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 1rem;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(59,130,246,0.35);
    transition: all 0.15s;
  }
  .btn-restart:hover { background: var(--primary-dark); transform: translateY(-2px); }
  .ripple {
    position: absolute;
    border-radius: 50%;
    width: 40px; height: 40px;
    background: rgba(255,255,255,0.45);
    animation: rippleAnim 0.5s linear;
    pointer-events: none;
    transform: scale(0);
  }
  @keyframes rippleAnim {
    from { transform: scale(0); opacity: 1; }
    to { transform: scale(8); opacity: 0; }
  }
</style>
</head>
<body>

<div class="header" id="header">
  <div class="header-title">🏃 Fiziki Tərbiyə Testi</div>
  <div class="score-pill" id="scorePill">✓ 0 / 0</div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
  </div>
</div>

<div class="nav-section" id="navSection">
  <div class="nav-label">Suallar arasında keçid</div>
  <div class="nav-grid" id="navGrid"></div>
</div>

<div class="main" id="mainArea">
  <div class="question-card" id="questionCard">
    <div class="q-number" id="qNumber"></div>
    <div class="q-text" id="qText"></div>
    <div class="options" id="optionsContainer"></div>
    <div class="feedback" id="feedbackBanner"></div>
  </div>
  <div class="nav-controls">
    <button class="btn btn-back" id="btnBack" onclick="navigate(-1)">← Geri</button>
    <span class="q-counter" id="qCounter"></span>
    <button class="btn btn-next" id="btnNext" onclick="navigate(1)">İrəli →</button>
  </div>
</div>

<div class="result-screen" id="resultScreen">
  <div class="result-emoji" id="resultEmoji">🏆</div>
  <div class="result-title">Test Tamamlandı!</div>
  <div class="result-score" id="resultScore"></div>
  <div class="result-sub" id="resultSub"></div>
  <div class="result-stats">
    <div class="stat-box">
      <div class="stat-val green" id="statCorrect">0</div>
      <div class="stat-label">✅ Düzgün</div>
    </div>
    <div class="stat-box">
      <div class="stat-val red" id="statWrong">0</div>
      <div class="stat-label">❌ Yanlış</div>
    </div>
    <div class="stat-box">
      <div class="stat-val orange" id="statSkipped">0</div>
      <div class="stat-label">⏭ Cavabsız</div>
    </div>
  </div>
  <button class="btn-restart" onclick="restartQuiz()">🔄 Yenidən Başla</button>
</div>

<script>
const questions = [
  { q: "Məsafəni ən qısa müddətdə qət etmə qabiliyyəti idmanın hansı əsas hərəki qabiliyyətinə aiddir?", opts: ["Qüvvə","Dözümlülük","Sürət","Çeviklik","Güc"], ans: 2 },
  { q: "Təkan verici hərəkətə, işıq və səs siqnallarına tez reaksiya vermə qabiliyyəti sürətin hansı növüdür?", opts: ["Maksimal sürət","Hərəkət sürəti","Reaksiya sürəti","Dözümlülük sürəti","Partlayış gücü"], ans: 2 },
  { q: "İnsanın qəfil dəyişən şəraitə uyğun olaraq hərəkətlərin istiqamətini və tempini tez dəyişdirmə bacarığı necə adlanır?", opts: ["Sürət","Çeviklik","Güc dözümlülüyü","Qüvvə","Bədənin əyilmə qabiliyyəti"], ans: 1 },
  { q: "Nüvə itələmə (Yadro itələmə) üzrə Beynəlxalq Atletika Federasiyalarının qaydalarına əsasən, kişilər üçün nüvənin çəkisi və optimal uçuş bucağı neçə olmalıdır?", opts: ["Çəki: 7,260 kq, Uçuş bucağı: 45-50 dərəcə","Çəki: 4 kq, Uçuş bucağı: 41-42 dərəcə","Çəki: 7,260 kq, Uçuş bucağı: 34,92 dərəcə","Çəki: 4 kq, Uçuş bucağı: 34,92 dərəcə","Çəki: 7,260 kq, Uçuş bucağı: 41-42 dərəcə"], ans: 4 },
  { q: "I Avropa Oyunları talisman hansılardır?", opts: ["Nar və ceyran","Su və alov","Qarabağ atları","Cırtdan və bəbir","Tülkü balası"], ans: 0 },
  { q: "Bir dəfəlik maksimal qüvvə tətbiq etməklə qaldırılan və ya itələnən yükün kütləsi ilə xarakterizə olunan güc növü hansıdır?", opts: ["Sürət gücü","Mütləq (maksimal) güc","Statik güc","Partlayış gücü","Güc dözümlülüyü"], ans: 1 },
  { q: "2008-ci il Pekin XXIX Yay Olimpiya oyunlarında qızıl medal qazanan idmançımız kim olub?", opts: ["Rövşən Bayramov","Vitali Rəhimov","Elnur Məmmədli","Xətaq Qazyukov","Mövlud Mirəliyev"], ans: 2 },
  { q: "Mümkün qədər qısa vaxt ərzində maksimum qüvvə təzahür etdirən hərəki qabiliyyətin tərkib komponentləri hansılardır?", opts: ["Sürətli qüvvə, sürət","Hərəkətin reaksiya tezliyi, tək hərəkətin icra tezliyi, maksimal qaçış sürəti","Oynaqların mütəhərrikliyi, əzələ-bağ aparatının elastikliyi","Koordinasiya, Hərəkətin icra çətinliyi, Hərəkətin icra vaxtı","Ümumi Dözümlülük, Sürət dözümlülüyü"], ans: 0 },
  { q: "Aşağıdakılardan hansı Gimnastika növlərindən DEYİL?", opts: ["Aerobika gimnastikası","Parkur","Batut gimnastikası və tamplinq","Akrobatika gimnastikası","Su gimnastikası (Hidroaerobika)"], ans: 4 },
  { q: "Əzələlərin gərginlik vəziyyətini uzun müddət saxlaya bilmə qabiliyyəti hansı hərəki qabiliyyətlə əlaqəlidir?", opts: ["Dözümlülük","Çeviklik","Sürət","Sürət-güc","Əyilmə qabiliyyəti"], ans: 3 },
  { q: "Orqanizmin yorğunluğa qarşı müqavimət göstərərək, fiziki fəaliyyəti uzun müddət davam etdirmə bacarığı nə adlanır?", opts: ["Sürət","Qüvvə","Dözümlülük","Çeviklik","Güc"], ans: 2 },
  { q: "Hər hansı idman növündə hərəkətin yarış şəraitinin tələblərinə uyğun rejimdə icrası zamanı özünü göstərir. 400 metrə qaçışda və ya üzmədə lazım olan, yüksək intensivlikli hərəkətləri nisbətən uzun müddət saxlaya bilmə qabiliyyəti dözümlülüyün hansı növünə aiddir?", opts: ["Ümumi dözümlülük","Dinamik dözümlülük","Xüsusi (Sürət) dözümlülük","Statik dözümlülük","Koordinasiya dözümlülüyü"], ans: 2 },
  { q: "Oynaq və əzələlərdə hərəkətin maksimal amplitudada yerinə yetirilməsi imkanı hansı hərəki qabiliyyət ilə ölçülür?", opts: ["Çeviklik","Qüvvə","Bədənin əyilmə qabiliyyəti","Dözümlülük","Sürət"], ans: 2 },
  { q: "Bədənin Əyilmə Qabiliyyətini inkişaf etdirmək üçün ən çox hansı məşq növü istifadə olunur?", opts: ["Ağırlıq qaldırma","Sprint qaçışları","Gimnastika hərəkətləri","Uzun məsafəyə qaçış","Partlayış hərəkətləri"], ans: 2 },
  { q: "Oynaqların hərəkət amplitudası hərəkətin öz gücünə (əzələ gərginliyi hesabına) yerinə yetirilir, bu əyilmə qabiliyyətinin hansı növüdür?", opts: ["Passiv əyilmə","Maksimal əyilmə","Fəal əyilmə","Statik əyilmə","Dinamik əyilmə"], ans: 2 },
  { q: "Fiziki tərbiyə dərsində \"Konusların ətrafında sürətlə qaçış\" tapşırığı əsasən hansı iki hərəki qabiliyyəti inkişaf etdirməyə yönəldilmişdir?", opts: ["Dözümlülük və Qüvvə","Güc və Əyilmə qabiliyyəti","Sürət və Çeviklik","Sürət və Qüvvə","Dözümlülük və Sürət"], ans: 2 },
  { q: "Sürət-güc hansı iki hərəki qabiliyyətin sintezindən yaranır?", opts: ["Çeviklik və Dözümlülük","Bədənin əyilmə qabiliyyəti və Güc","Dözümlülük və Sürət","Qüvvə və Sürət","Qüvvə və Çeviklik"], ans: 3 },
  { q: "6.75 metrlik xəttin arxasından atış zamanı rəqib oyunçuya foul edilərsə və atış uğursuz olarsa, neçə cərimə atışı verilir?", opts: ["1 cərimə atışı","2 cərimə atışı","3 cərimə atışı","Foulun növündən asılı olaraq dəyişir","Heç bir cərimə atışı verilməz, top rəqibə keçir"], ans: 2 },
  { q: "Badmintonda servislər nə vaxt soldan vurulur?", opts: ["Cüt xallar zamanı (2,4,6...)","Servis dəyişəndə","Tək xallar zamanı (1, 3, 5...)","11 xala çatdıqda","Yalnız 20-20 hesabında"], ans: 2 },
  { q: "Futbolda sərbəst zərbə hansı halda təyin edilmir?", opts: ["Təhlükəli oyun","Qəsdən maneəçilik","Rəqibi təhqir etmək","Oyundankənar vəziyyət zamanı","Qapıçı topu 8 saniyədən artıq özündə saxlayarsa"], ans: 4 },
  { q: "Basketbolda cərimə atışı edən oyunçuya atış zamanı hansı vaxt limiti tətbiq edilir?", opts: ["3 saniyə","5 saniyə","8 saniyə","10 saniyə","24 saniyə"], ans: 1 },
  { q: "Həndbolda qapıçı zərbəsi hansı halda verilir?", opts: ["Top tavanı vurduqda","Topa sahib olan komanda qaydanı pozduqda","Qapıçı topu öz qapı meydançasında nəzarət altına aldıqda","Səhv əvəzetmə olduqda","9 metrlik xəttdə qayda pozuntusu olduqda"], ans: 2 },
  { q: "Voleybol komandasının tərkibi ilə bağlı hansı fikirlər doğrudur?\n1. Komanda 12 nəfər oyunçudan ibarətdir.\n2. Əsas heyət 8, ehtiyat heyət 6 oyunçudan ibarətdir.\n3. Hər komandada ən azı 2 libero oyunçu mütləq olmalıdır.\n4. Beynəlxalq yarışlarda 8 ehtiyat oyunçu iştirak edə bilər.\n5. Hər komandada 1 libero oyunçu mütləq olmalıdır.", opts: ["1, 2, 5","1, 4, 5","1, 3, 4","2, 4, 5","1, 2, 3"], ans: 1 },
  { q: "Şah lövhədə necə hərəkət edir?", opts: ["Hər istiqamətdə istənilən sayda xana","Yalnız diaqonal boyu","Yalnız düz xətt boyu","Hər istiqamətdə yalnız bir xana","L hərfi şəklində"], ans: 3 },
  { q: "Aşağıdakılardan hansı 3×3 basketbol qaydaları üçün SƏHVdir?", opts: ["Oyun 10 dəqiqə və ya 21 xal toplanana qədər davam edir","Hər komandanın 4 oyunçusu olur (3 meydanda, 1 ehtiyat)","Hər uğurlu atış 1 və ya 2 xal dəyərindədir","12 saniyəlik hücum vaxtı tətbiq olunur","Hakimin hava atışı ilə başlayır"], ans: 4 },

  { q: "Uşaqlar önümüzdəki imtahanlarda yüksək bal toplamaq üçün nə etmək olar? Bütün şagirdlərin fikirləri muhakimə edilmədən dinlənildi, sonda bu fikirlərin müzakirəsi həyata keçirildi. Müəllim bu zaman hansı iş üsulunu tətbiq etdi?", opts: ["Söz assosasiyası","BIBÖ","Anlayışın çıxarılması","Beyin həmləsi","Karusel"], ans: 3 },

  { q: "Hansı rəy konstruktivdir?", opts: ["Söylədiklərin doğrudur, məsələnin şərtini oxuyarkən bütün verilənləri özündə qeyd etsən, həll zamanı unutduğun heç nə qalmayacaq","Yazında maraqlı fikirlər olsa da, əvvəlcədən sizə təqdim olunan rubrikin birinci meyarına cavab vermir","Səhv cavablarının sayı düz cavablardan çoxdur. Diqqətli ol.","Müzakirədə fikirlərini aydın ifadə etdin, amma yoldaşlarına danışmağa fürsət vermirsən, belə olmaz.","Əşyanı səliqəli düzəltmisən, amma bəzi hissələrdə parçaları düzgün birləşdirməmisən."], ans: 0 },
  { q: "Dərsin mövzusunu Elxan ilə müzakirə edən Nərgizə, müəllim irad bildirir və mövzunu Elxan ilə yox qız şagirdlər ilə birgə müzakirə etməyi məsləhət görür. \"Təhsilverənlərin etik davranış qaydaları\"nın hansı prinsipi pozulmuş olur?", opts: ["peşəkarlıq və fərdi məsuliyyət","loyallıq","qərəzsizlik","konfidensiallıq","ictimai etimad"], ans: 2 },
  { q: "Yanlış fikri müəyyənləşdirin.", opts: ["Strateji uyğunlaşma – tapşırığın birbaşa əhəmiyyəti şagird üçün çox azdır","Xaos - şagirddə təhsilə qarşı mənfi münasibət formalaşır","Ənənəyə uymaq – şagirdin məqsədi minimum tələbi yerinə yetirməkdir","Geri çəkilmə - şagird tapşırığın həllində iştirak etmir, öyrənmə səthi baş tutur","Yüksək cəlbolunma – şagird tapşırığı özü üçün dəyərli və lazımlı bilir"], ans: 3 },
  { q: "Şagird – \"imtahan nəticələrim aşağı olsa, insanlar mənə nə deyər?\" düşüncəsi ilə gecə-gündüz imtahana hazırlaşır. L. Kolberqin \"Mənəvi inkişaf\" nəzəriyyəsinə əsasən hansı mərhələdədir?", opts: ["İtaət və cəza","İndividualizm","Sosial müqavilə","Səlahiyyət və sosial nizamı qorumaq","Qəbulolunma"], ans: 4 },
  { q: "Müəllim şagirdlərə \"güclü və zəif tərəflərinizi əks etdirən cədvəl qurun\" tapşırığını verir. Bu tapşırığı icra edən şagird emosional sahənin hansı mərhələsindədir?", opts: ["Təşkiletmə","Dəyərləndirmə","Xarakterizəetmə","Qəbuletmə","Cavabvermə"], ans: 0 },
  { q: "Aşağıdakılardan hansı anlayışın çıxarılması üsuluna aiddir?", opts: ["Yaradıcı ideyaların bir araya gətirilməsi və bölüşülməsi baxımından faydalıdır.","Şagirdin bildikləri arasında nə dərəcədə düzgün əlaqə yarada bilib-bilmədiklərini yoxlamaq imkanı verir.","Refleksiya etmək üçün istifadə olunan effektiv üsuldur.","Bu üsulda qruplara bölünmüş şagirdlər öz mövqelərini arqumentlərlə müdafiə etməlidirlər.","Xəyali bir situasiyanı canlandıraraq mövzunun daha dərindən öyrənilməsini təmin edir."], ans: 1 }
];

let current = 0;
let answers = new Array(questions.length).fill(null);
let chosenIdx = {};
let correctCount = 0;

// Audio
let audioCtx;
function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playCorrect() {
  try {
    const ctx = getCtx();
    [[0,523],[0.13,659],[0.26,784]].forEach(([t,f]) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type='sine'; o.frequency.value=f;
      g.gain.setValueAtTime(0.28,ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+t+0.22);
      o.start(ctx.currentTime+t); o.stop(ctx.currentTime+t+0.22);
    });
  } catch(e){}
}
function playWrong() {
  try {
    const ctx = getCtx();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type='sawtooth';
    o.frequency.setValueAtTime(220,ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(90,ctx.currentTime+0.32);
    g.gain.setValueAtTime(0.22,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.32);
    o.start(ctx.currentTime); o.stop(ctx.currentTime+0.32);
  } catch(e){}
}
function playFinish() {
  try {
    const ctx = getCtx();
    [523,659,784,1047,784,1047,1319].forEach((f,i) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type='sine'; o.frequency.value=f;
      const t=ctx.currentTime+i*0.13;
      g.gain.setValueAtTime(0.22,t);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.18);
      o.start(t); o.stop(t+0.18);
    });
  } catch(e){}
}

// Build nav
function buildNav() {
  const g = document.getElementById('navGrid');
  g.innerHTML = '';
  for (let i = 0; i < questions.length; i++) {
    const b = document.createElement('button');
    b.className = 'nav-btn';
    b.textContent = i+1;
    b.id = 'nav_'+i;
    b.onclick = () => goTo(i);
    g.appendChild(b);
  }
}

function updateNav() {
  for (let i = 0; i < questions.length; i++) {
    const b = document.getElementById('nav_'+i);
    if (!b) continue;
    b.className = 'nav-btn';
    if (i === current) b.classList.add('current');
    else if (answers[i] === true) b.classList.add('correct');
    else if (answers[i] === false) b.classList.add('wrong');
  }
}

function renderQ(idx) {
  const q = questions[idx];
  document.getElementById('qNumber').textContent = `Sual ${idx+1} / ${questions.length}`;
  document.getElementById('qText').textContent = q.q;
  document.getElementById('qCounter').textContent = `${idx+1} / ${questions.length}`;

  const letters = ['A','B','C','D','E'];
  const cont = document.getElementById('optionsContainer');
  cont.innerHTML = '';

  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    const isCorrect = (i === q.ans);
    btn.innerHTML = `<span class="option-letter">${letters[i]}</span><span class="option-text">${opt}</span><span class="option-icon">${isCorrect ? '✓' : '✗'}</span>`;
    if (answers[idx] !== null) {
      btn.disabled = true;
      if (isCorrect) btn.classList.add('correct');
      if (answers[idx] === false && chosenIdx[idx] === i) btn.classList.add('wrong');
    }
    btn.onclick = (e) => handleAnswer(idx, i, btn, e);
    cont.appendChild(btn);
  });

  const fb = document.getElementById('feedbackBanner');
  fb.className = 'feedback';
  if (answers[idx] === true) {
    fb.className = 'feedback correct';
    fb.innerHTML = '✅ Əla! Düzgün cavab!';
  } else if (answers[idx] === false) {
    fb.className = 'feedback wrong';
    fb.innerHTML = `❌ Yanlış! Düzgün cavab: <strong>${letters[q.ans]}) ${q.opts[q.ans]}</strong>`;
  }

  updateNav();
  updateScore();

  document.getElementById('btnBack').disabled = idx === 0;
  const allDone = answers.every(a => a !== null);
  document.getElementById('btnNext').textContent = (idx === questions.length-1 && allDone) ? 'Nəticə 🏆' : 'İrəli →';

  const card = document.getElementById('questionCard');
  card.style.animation = 'none'; card.offsetHeight; card.style.animation = 'slideIn 0.3s ease';
}

function updateScore() {
  const answered = answers.filter(a => a !== null).length;
  document.getElementById('scorePill').textContent = `✓ ${correctCount} / ${answered}`;
  document.getElementById('progressBar').style.width = (answered / questions.length * 100) + '%';
}

function handleAnswer(qIdx, chosen, btnEl, event) {
  if (answers[qIdx] !== null) return;
  const q = questions[qIdx];

  // ripple
  const rip = document.createElement('span');
  rip.className = 'ripple';
  const r = btnEl.getBoundingClientRect();
  rip.style.left = (event.clientX - r.left - 20) + 'px';
  rip.style.top = (event.clientY - r.top - 20) + 'px';
  btnEl.appendChild(rip);
  setTimeout(() => rip.remove(), 600);

  const cont = document.getElementById('optionsContainer');
  const allBtns = cont.querySelectorAll('.option-btn');
  allBtns.forEach(b => b.disabled = true);

  const letters = ['A','B','C','D','E'];
  const fb = document.getElementById('feedbackBanner');

  if (chosen === q.ans) {
    answers[qIdx] = true;
    correctCount++;
    btnEl.classList.add('correct');
    fb.className = 'feedback correct';
    fb.innerHTML = '✅ Əla! Düzgün cavab!';
    playCorrect();
  } else {
    answers[qIdx] = false;
    chosenIdx[qIdx] = chosen;
    btnEl.classList.add('wrong');
    allBtns[q.ans].classList.add('show-correct');
    allBtns[q.ans].querySelector('.option-icon').textContent = '✓';
    allBtns[q.ans].querySelector('.option-icon').style.opacity = '1';
    fb.className = 'feedback wrong';
    fb.innerHTML = `❌ Yanlış! Düzgün cavab: <strong>${letters[q.ans]}) ${q.opts[q.ans]}</strong>`;
    playWrong();
  }

  updateNav();
  updateScore();
  if (answers.every(a => a !== null)) {
    document.getElementById('btnNext').textContent = 'Nəticə 🏆';
  }
}

function navigate(dir) {
  const next = current + dir;
  if (next < 0) return;
  if (next >= questions.length) {
    if (answers.every(a => a !== null)) showResult();
    return;
  }
  goTo(next);
}

function goTo(idx) {
  current = idx;
  renderQ(idx);
  window.scrollTo({top:0, behavior:'smooth'});
}

function showResult() {
  playFinish();
  document.getElementById('mainArea').style.display = 'none';
  document.getElementById('navSection').style.display = 'none';
  const res = document.getElementById('resultScreen');
  res.style.display = 'flex';
  const wrong = answers.filter(a => a === false).length;
  const skipped = answers.filter(a => a === null).length;
  const pct = Math.round(correctCount / questions.length * 100);
  document.getElementById('resultScore').textContent = `${correctCount} / ${questions.length}`;
  document.getElementById('resultSub').textContent = `Uğur faizi: ${pct}%`;
  document.getElementById('statCorrect').textContent = correctCount;
  document.getElementById('statWrong').textContent = wrong;
  document.getElementById('statSkipped').textContent = skipped;
  document.getElementById('resultEmoji').textContent = pct >= 90 ? '🏆' : pct >= 70 ? '🎉' : pct >= 50 ? '👍' : '😔';
}

function restartQuiz() {
  current = 0;
  answers = new Array(questions.length).fill(null);
  Object.keys(chosenIdx).forEach(k => delete chosenIdx[k]);
  correctCount = 0;
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('mainArea').style.display = 'block';
  document.getElementById('navSection').style.display = 'block';
  buildNav();
  renderQ(0);
  window.scrollTo({top:0});
}

buildNav();
renderQ(0);
</script>
