// Audio context for sounds
const AC = new (window.AudioContext||window.webkitAudioContext)();

function playJump(){
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.frequency.setValueAtTime(300,AC.currentTime);
  o.frequency.exponentialRampToValueAtTime(600,AC.currentTime+0.1);
  g.gain.setValueAtTime(0.3,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.15);
  o.start();o.stop(AC.currentTime+0.15);
}

function playDuck(){
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.frequency.setValueAtTime(200,AC.currentTime);
  o.frequency.exponentialRampToValueAtTime(100,AC.currentTime+0.08);
  g.gain.setValueAtTime(0.2,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.1);
  o.start();o.stop(AC.currentTime+0.1);
}

function playDie(){
  const o=AC.createOscillator(),g=AC.createGain();
  o.type='sawtooth';
  o.connect(g);g.connect(AC.destination);
  o.frequency.setValueAtTime(400,AC.currentTime);
  o.frequency.exponentialRampToValueAtTime(50,AC.currentTime+0.4);
  g.gain.setValueAtTime(0.4,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.4);
  o.start();o.stop(AC.currentTime+0.4);
}

function playScore(){
  const o=AC.createOscillator(),g=AC.createGain();
  o.frequency.setValueAtTime(500,AC.currentTime);
  o.frequency.exponentialRampToValueAtTime(800,AC.currentTime+0.05);
  g.gain.setValueAtTime(0.15,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.1);
  o.connect(g);g.connect(AC.destination);
  o.start();o.stop(AC.currentTime+0.1);
}

let state='idle',score=0,hi=0,frame=0,spd=5;
let lastMilestone=0;

const NORMAL_H=58, DUCK_H=30, NORMAL_W=44, DUCK_W=60;

const P={
  x:80,y:GROUND,w:NORMAL_W,h:NORMAL_H,
  vy:0,ground:true,jc:0,ducking:false,duckTimer:0,
  jump(){
    if(this.ducking){this.ducking=false;this.h=NORMAL_H;this.w=NORMAL_W;return;}
    if(this.jc<2){
      this.vy=-13;this.ground=false;this.jc++;
      playJump();
    }
  },
  duck(){
    if(!this.ground)return;
    if(!this.ducking){this.ducking=true;this.h=DUCK_H;this.w=DUCK_W;playDuck();}
    this.duckTimer=12;
  },
  update(){
    if(this.ducking){
      this.duckTimer--;
      if(this.duckTimer<=0){this.ducking=false;this.h=NORMAL_H;this.w=NORMAL_W;}
    }
    this.vy+=0.7;this.y+=this.vy;
    if(this.y>=GROUND){this.y=GROUND;this.vy=0;this.ground=true;this.jc=0;}
  },
  draw(){
    ctx.save();
    if(this.ducking){
      // Draw squished/ducked - rotate slightly
      ctx.translate(this.x+this.w/2, this.y-this.h/2);
      ctx.rotate(0.3);
      if(playerImg.complete&&playerImg.naturalWidth>0)
        ctx.drawImage(playerImg,-this.w/2,-this.h/2,this.w,this.h);
      else{ctx.fillStyle='#e94560';ctx.fillRect(-this.w/2,-this.h/2,this.w,this.h);}
    } else {
      if(playerImg.complete&&playerImg.naturalWidth>0)
        ctx.drawImage(playerImg,this.x,this.y-this.h,this.w,this.h);
      else{ctx.fillStyle='#e94560';ctx.fillRect(this.x,this.y-this.h,this.w,this.h);}
    }
    ctx.restore();
  },
  rect(){
    if(this.ducking) return{x:this.x+6,y:this.y-this.h,w:this.w-12,h:this.h};
    return{x:this.x+8,y:this.y-this.h+6,w:this.w-16,h:this.h-6};
  }
};

// Obstacles - some low (jump over), some high (duck under)
let obs=[],nxt=80,parts=[];
const stars=Array.from({length:60},()=>({x:Math.random()*W,y:Math.random()*(GROUND-10),r:Math.random()*1.5+0.3,s:Math.random()*0.5+0.1}));

function spawn(){
  const types=[
    {w:22,h:45,y:GROUND-45,type:'low'},
    {w:28,h:58,y:GROUND-58,type:'low'},
    {w:18,h:68,y:GROUND-68,type:'low'},
    {w:70,h:28,y:GROUND-90,type:'high'},  // fly over ground - duck under
    {w:60,h:22,y:GROUND-85,type:'high'},
  ];
  const t=types[Math.floor(Math.random()*types.length)];
  obs.push({x:W+20,y:t.y,w:t.w,h:t.h,type:t.type});
}

function hit(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}
function reset(){P.y=GROUND;P.vy=0;P.ground=true;P.jc=0;P.ducking=false;P.h=NORMAL_H;P.w=NORMAL_W;obs=[];nxt=80;score=0;spd=5;frame=0;parts=[];lastMilestone=0;}

function drawBg(){
  const g=ctx.createLinearGradient(0,0,0,GROUND);
  g.addColorStop(0,'#0d0d1a');g.addColorStop(1,'#16213e');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,GROUND);
  stars.forEach(s=>{s.x-=s.s*(spd/5);if(s.x<0)s.x=W;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle='rgba(168,218,220,0.8)';ctx.fill();});
  ctx.fillStyle='#0f3460';ctx.fillRect(0,GROUND,W,H-GROUND);
  ctx.fillStyle='#e94560';ctx.fillRect(0,GROUND,W,2);
  ctx.strokeStyle='rgba(233,69,96,0.12)';ctx.lineWidth=1;
  for(let i=0;i<8;i++){const lx=((frame*spd*0.5)+i*90)%W;ctx.beginPath();ctx.moveTo(lx,GROUND);ctx.lineTo(lx-30,H);ctx.stroke();}
}

function loop(){
  ctx.clearRect(0,0,W,H);drawBg();
  if(state==='running'){
    frame++;score++;spd=5+Math.floor(score/300)*0.5;
    // Milestone sound every 500 pts
    const ms=Math.floor(score/500);
    if(ms>lastMilestone){lastMilestone=ms;playScore();}

    P.update();
    if(P.ground&&Math.random()<0.3) parts.push({x:P.x+P.w/2,y:GROUND,vx:-Math.random()*2-1,vy:-Math.random()*2,life:20});
    if(--nxt<=0){spawn();nxt=Math.floor(Math.random()*55+45);}
    obs.forEach(o=>o.x-=spd);obs=obs.filter(o=>o.x>-80);
    const pr=P.rect();
    for(const o of obs){if(hit(pr,o)){state='dead';if(score>hi)hi=score;playDie();break;}}
    document.getElementById('score').textContent=score;
    document.getElementById('high').textContent=hi;
  }

  // Particles
  parts=parts.filter(p=>p.life>0);
  parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life--;ctx.beginPath();ctx.arc(p.x,p.y,2,0,Math.PI*2);ctx.fillStyle='rgba(233,69,96,'+(p.life/20)+')';ctx.fill();});

  // Draw obstacles
  obs.forEach(o=>{
    const g=ctx.createLinearGradient(o.x,o.y,o.x+o.w,o.y+o.h);
    if(o.type==='high'){
      // Flying obstacle - purple/danger color
      g.addColorStop(0,'#4a0080');g.addColorStop(1,'#e94560');
      ctx.fillStyle=g;ctx.fillRect(o.x,o.y,o.w,o.h);
      // Wings hint
      ctx.strokeStyle='rgba(233,69,96,0.7)';ctx.lineWidth=1;
      ctx.strokeRect(o.x,o.y,o.w,o.h);
      ctx.fillStyle='rgba(233,69,96,0.3)';
      ctx.fillRect(o.x,o.y-8,o.w,8);
      // Label
      ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='9px Courier New';ctx.textAlign='center';
      ctx.fillText('↓ EYİL',o.x+o.w/2,o.y-12);
      ctx.textAlign='left';
    } else {
      g.addColorStop(0,'#0f3460');g.addColorStop(1,'#e94560');
      ctx.fillStyle=g;ctx.fillRect(o.x,o.y,o.w,o.h);
      ctx.strokeStyle='rgba(233,69,96,0.5)';ctx.lineWidth=1;ctx.strokeRect(o.x,o.y,o.w,o.h);
    }
  });

  P.draw();

  // Speed indicator
  if(state==='running'){
    ctx.fillStyle='rgba(168,218,220,0.4)';ctx.font='10px Courier New';
    ctx.textAlign='right';
    ctx.fillText('SÜR: x'+(spd.toFixed(1)),W-8,14);
    ctx.textAlign='left';
  }

  if(state==='idle'){
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#e94560';ctx.font='bold 28px Courier New';ctx.textAlign='center';
    ctx.fillText('RUNNER',W/2,H/2-18);
    ctx.fillStyle='#a8dadc';ctx.font='13px Courier New';
    ctx.fillText('SPACE / ↑ basın',W/2,H/2+14);
    ctx.textAlign='left';
  }
  if(state==='dead'){
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#e94560';ctx.font='bold 26px Courier New';ctx.textAlign='center';
    ctx.fillText('OYUN BİTDİ',W/2,H/2-22);
    ctx.fillStyle='white';ctx.font='14px Courier New';
    ctx.fillText('XAL: '+score+'  REKORD: '+hi,W/2,H/2+8);
    ctx.fillStyle='#a8dadc';ctx.font='12px Courier New';
    ctx.fillText('Yenidən başlamaq üçün SPACE basın',W/2,H/2+30);
    ctx.textAlign='left';
  }

  requestAnimationFrame(loop);
}

const keys={};
document.addEventListener('keydown',e=>{
  if(AC.state==='suspended') AC.resume();
  if(e.code==='Space'||e.code==='ArrowUp'){
    e.preventDefault();
    if(state==='idle'){state='running';}
    else if(state==='dead'){reset();state='running';}
    else P.jump();
  }
  if((e.code==='ArrowDown'||e.code==='KeyS')&&state==='running'){
    e.preventDefault(); P.duck();
  }
});

canvas.addEventListener('click',()=>{
  if(AC.state==='suspended') AC.resume();
  if(state==='idle'){state='running';}
  else if(state==='dead'){reset();state='running';}
  else P.jump();
});

// Touch - swipe down to duck, tap to jump
let touchStartY=0;
canvas.addEventListener('touchstart',e=>{e.preventDefault();if(AC.state==='suspended')AC.resume();touchStartY=e.touches[0].clientY;});
canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  const dy=e.changedTouches[0].clientY-touchStartY;
  if(dy>30&&state==='running'){P.duck();}
  else{
    if(state==='idle'){state='running';}
    else if(state==='dead'){reset();state='running';}
    else P.jump();
  }
});

loop();
</script>
