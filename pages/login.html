<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giriş — TestHub</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c28;
  --border:#2a2a3a;--accent:#6c63ff;--accent2:#ff6584;
  --text:#f0f0ff;--muted:#8888aa;--danger:#ff4757;--success:#43e97b;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 30%,rgba(108,99,255,0.15) 0%,transparent 70%);pointer-events:none;}
.card{position:relative;z-index:1;background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:48px 40px;width:100%;max-width:440px;box-shadow:0 40px 100px rgba(0,0,0,0.5);}
.logo{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;margin-bottom:8px;text-decoration:none;display:block;}
.card-title{font-family:'Syne',sans-serif;font-size:1.7rem;font-weight:800;text-align:center;margin-bottom:6px;}
.card-sub{text-align:center;color:var(--muted);font-size:0.9rem;margin-bottom:36px;}
.form-group{margin-bottom:18px;}
label{display:block;font-size:0.85rem;font-weight:600;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.05em;}
input{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;padding:13px 16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.97rem;outline:none;transition:border-color 0.2s;}
input:focus{border-color:var(--accent);}
input::placeholder{color:var(--muted);}
.btn-submit{width:100%;background:linear-gradient(135deg,var(--accent),#8b7fff);color:white;border:none;padding:14px;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:all 0.2s;margin-top:8px;box-shadow:0 8px 24px rgba(108,99,255,0.35);}
.btn-submit:hover{transform:translateY(-1px);box-shadow:0 12px 32px rgba(108,99,255,0.5);}
.btn-submit:disabled{opacity:0.6;cursor:default;transform:none;}
.alert{padding:12px 16px;border-radius:10px;font-size:0.88rem;margin-bottom:16px;display:none;}
.alert-error{background:rgba(255,71,87,0.12);border:1px solid rgba(255,71,87,0.3);color:#ff6b7a;}
.alert-success{background:rgba(67,233,123,0.12);border:1px solid rgba(67,233,123,0.3);color:var(--success);}
.divider{text-align:center;color:var(--muted);font-size:0.85rem;margin:24px 0;position:relative;}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:38%;height:1px;background:var(--border);}
.divider::before{left:0;} .divider::after{right:0;}
.link-row{text-align:center;font-size:0.9rem;color:var(--muted);}
.link-row a{color:var(--accent);text-decoration:none;font-weight:600;}
.link-row a:hover{text-decoration:underline;}
.back-link{display:flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:0.85rem;margin-bottom:28px;transition:color 0.2s;}
.back-link:hover{color:var(--text);}
</style>
</head>
<body>
<div class="card">
  <a href="../index.html" class="back-link">← Ana səhifəyə qayıt</a>
  <a href="../index.html" class="logo">TestHub</a>
  <h1 class="card-title">Xoş gəldiniz! 👋</h1>
  <p class="card-sub">Hesabınıza daxil olun</p>

  <div class="alert alert-error" id="errorMsg"></div>
  <div class="alert alert-success" id="successMsg"></div>

  <div class="form-group">
    <label>Email</label>
    <input type="email" id="email" placeholder="email@example.com" autocomplete="email">
  </div>
  <div class="form-group">
    <label>Şifrə</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>

  <button class="btn-submit" id="loginBtn" onclick="handleLogin()">Daxil ol</button>

  <div class="divider">və ya</div>
  <div class="link-row">Hesabınız yoxdur? <a href="register.html">Qeydiyyat</a></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="../js/firebase-config.js"></script>
<script src="../js/auth.js"></script>
<script>
// Enter ilə giriş
document.addEventListener('keypress', e => { if (e.key === 'Enter') handleLogin(); });

async function handleLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('errorMsg');
  const suc = document.getElementById('successMsg');

  err.style.display = 'none'; suc.style.display = 'none';
  if (!email || !password) { showError('Email və şifrəni daxil edin'); return; }

  btn.disabled = true; btn.textContent = 'Yüklənir...';
  try {
    await loginUser(email, password);
    suc.textContent = '✅ Uğurla daxil oldunuz!'; suc.style.display = 'block';
    const params = new URLSearchParams(window.location.search);
    const redirect = params.get('redirect');
    const id = params.get('id');
    setTimeout(() => {
      if (redirect === 'test' && id) window.location.href = 'test.html?id=' + id;
      else if (isAdmin(email)) window.location.href = '../admin/index.html';
      else window.location.href = 'dashboard.html';
    }, 800);
  } catch (e) {
    const msgs = {
      'auth/user-not-found': 'Bu email ilə hesab tapılmadı',
      'auth/wrong-password': 'Şifrə yanlışdır',
      'auth/invalid-email': 'Email formatı yanlışdır',
      'auth/too-many-requests': 'Çox sayda cəhd. Bir az gözləyin.'
    };
    showError(msgs[e.code] || 'Xəta baş verdi: ' + e.message);
    btn.disabled = false; btn.textContent = 'Daxil ol';
  }
}

function showError(msg) {
  const err = document.getElementById('errorMsg');
  err.textContent = '⚠️ ' + msg; err.style.display = 'block';
}

// Artıq giriş etmisə yönləndir
auth.onAuthStateChanged(user => {
  if (user) window.location.href = 'dashboard.html';
});
</script>
</body>
</html>
