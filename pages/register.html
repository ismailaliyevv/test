<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qeydiyyat — TestHub</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c28;--border:#2a2a3a;--accent:#6c63ff;--accent2:#ff6584;--text:#f0f0ff;--muted:#8888aa;--success:#43e97b;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 30%,rgba(255,101,132,0.12) 0%,transparent 70%);pointer-events:none;}
.card{position:relative;z-index:1;background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:48px 40px;width:100%;max-width:440px;box-shadow:0 40px 100px rgba(0,0,0,0.5);}
.logo{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;margin-bottom:8px;text-decoration:none;display:block;}
.card-title{font-family:'Syne',sans-serif;font-size:1.7rem;font-weight:800;text-align:center;margin-bottom:6px;}
.card-sub{text-align:center;color:var(--muted);font-size:0.9rem;margin-bottom:36px;}
.form-group{margin-bottom:16px;}
label{display:block;font-size:0.82rem;font-weight:600;color:var(--muted);margin-bottom:7px;text-transform:uppercase;letter-spacing:0.05em;}
input{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;padding:13px 16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.97rem;outline:none;transition:border-color 0.2s;}
input:focus{border-color:var(--accent);}
input::placeholder{color:var(--muted);}
.strength-bar{height:4px;border-radius:2px;margin-top:8px;background:var(--border);overflow:hidden;}
.strength-fill{height:100%;border-radius:2px;transition:all 0.3s;width:0;}
.btn-submit{width:100%;background:linear-gradient(135deg,var(--accent),#8b7fff);color:white;border:none;padding:14px;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:all 0.2s;margin-top:8px;box-shadow:0 8px 24px rgba(108,99,255,0.35);}
.btn-submit:hover{transform:translateY(-1px);}
.btn-submit:disabled{opacity:0.6;cursor:default;transform:none;}
.alert{padding:12px 16px;border-radius:10px;font-size:0.88rem;margin-bottom:16px;display:none;}
.alert-error{background:rgba(255,71,87,0.12);border:1px solid rgba(255,71,87,0.3);color:#ff6b7a;}
.alert-success{background:rgba(67,233,123,0.12);border:1px solid rgba(67,233,123,0.3);color:var(--success);}
.link-row{text-align:center;font-size:0.9rem;color:var(--muted);margin-top:20px;}
.link-row a{color:var(--accent);text-decoration:none;font-weight:600;}
.back-link{display:flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:0.85rem;margin-bottom:28px;transition:color 0.2s;}
.back-link:hover{color:var(--text);}
.terms{font-size:0.8rem;color:var(--muted);text-align:center;margin-top:16px;line-height:1.5;}
</style>
</head>
<body>
<div class="card">
  <a href="../index.html" class="back-link">← Ana səhifəyə qayıt</a>
  <a href="../index.html" class="logo">TestHub</a>
  <h1 class="card-title">Hesab Yaradın 🚀</h1>
  <p class="card-sub">Pulsuz qeydiyyatdan keçin</p>

  <div class="alert alert-error" id="errorMsg"></div>
  <div class="alert alert-success" id="successMsg"></div>

  <div class="form-group">
    <label>Ad Soyad</label>
    <input type="text" id="name" placeholder="Adınız Soyadınız">
  </div>
  <div class="form-group">
    <label>Email</label>
    <input type="email" id="email" placeholder="email@example.com">
  </div>
  <div class="form-group">
    <label>Şifrə</label>
    <input type="password" id="password" placeholder="Minimum 6 simvol" oninput="checkStrength(this.value)">
    <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
  </div>
  <div class="form-group">
    <label>Şifrəni Təkrarla</label>
    <input type="password" id="password2" placeholder="••••••••">
  </div>

  <button class="btn-submit" id="regBtn" onclick="handleRegister()">Qeydiyyatdan Keç</button>
  <div class="terms">Davam etməklə istifadə şərtlərini qəbul edirsiniz</div>
  <div class="link-row">Artıq hesabınız var? <a href="login.html">Daxil olun</a></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="../js/firebase-config.js"></script>
<script src="../js/auth.js"></script>
<script>
function checkStrength(password) {
  const fill = document.getElementById('strengthFill');
  let strength = 0;
  if (password.length >= 6) strength++;
  if (password.length >= 10) strength++;
  if (/[A-Z]/.test(password)) strength++;
  if (/[0-9]/.test(password)) strength++;
  if (/[^A-Za-z0-9]/.test(password)) strength++;
  const colors = ['#ff4757', '#ff6348', '#ffa502', '#2ed573', '#43e97b'];
  const widths = ['20%', '40%', '60%', '80%', '100%'];
  fill.style.width = password ? widths[strength - 1] || '10%' : '0';
  fill.style.background = password ? colors[strength - 1] || '#ff4757' : '';
}

async function handleRegister() {
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const password2 = document.getElementById('password2').value;
  const btn = document.getElementById('regBtn');

  document.getElementById('errorMsg').style.display = 'none';
  document.getElementById('successMsg').style.display = 'none';

  if (!name || !email || !password) { showError('Bütün xanaları doldurun'); return; }
  if (password !== password2) { showError('Şifrələr uyğun gəlmir'); return; }
  if (password.length < 6) { showError('Şifrə minimum 6 simvol olmalıdır'); return; }

  btn.disabled = true; btn.textContent = 'Qeydiyyat edilir...';
  try {
    await registerUser(name, email, password);
    document.getElementById('successMsg').textContent = '✅ Qeydiyyat uğurlu! Yönləndirilirsiniz...';
    document.getElementById('successMsg').style.display = 'block';
    setTimeout(() => window.location.href = 'dashboard.html', 1200);
  } catch (e) {
    const msgs = {
      'auth/email-already-in-use': 'Bu email artıq istifadə olunur',
      'auth/invalid-email': 'Email formatı yanlışdır',
      'auth/weak-password': 'Şifrə çox zəifdir'
    };
    showError(msgs[e.code] || e.message);
    btn.disabled = false; btn.textContent = 'Qeydiyyatdan Keç';
  }
}

function showError(msg) {
  const err = document.getElementById('errorMsg');
  err.textContent = '⚠️ ' + msg; err.style.display = 'block';
}

auth.onAuthStateChanged(user => { if (user) window.location.href = 'dashboard.html'; });
</script>
</body>
</html>
